    .app-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:5px 9px; background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.07); border-radius:7px; cursor:pointer; transition:all 0.2s; white-space:nowrap; flex-shrink:0; position:relative; min-width:54px; }

    .bl { font-size:0.52rem; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }

    .bd { position:absolute; top:4px; right:5px; width:4px; height:4px; border-radius:50%; background:#00ff88; box-shadow:0 0 5px #00ff88; opacity:0; transition:opacity 0.3s; }
    .app-btn.active .bd { opacity:1; }
    .iframe-wrap { flex:1; position:relative; overflow:hidden; background:var(--bg); }
    .app-frame { position:absolute; inset:0; width:100%; height:100%; border:none; opacity:0; pointer-events:none; transition:opacity 0.25s; }
    .app-frame.visible { opacity:1; pointer-events:all; touch-action:auto; }
    .welcome { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:14px; padding:20px; padding-top:max(20px,8vh); text-align:center; overflow-y:auto; -webkit-overflow-scrolling:touch; transition:opacity 0.3s; }
    .welcome.hidden { opacity:0; pointer-events:none; }
    .wlogo { font-size:1.7rem; font-weight:bold; letter-spacing:6px; color:var(--cyan); text-shadow:0 0 25px var(--cyan); animation:glow 3s ease-in-out infinite; }

    .wsub { font-size:0.6rem; letter-spacing:3px; color:var(--muted); }
    .wgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; max-width:420px; width:100%; margin-top:6px; }
    @media(max-width:460px){ .wgrid { grid-template-columns:repeat(2,1fr); } }
    .wcard { background:var(--card); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:12px 8px; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:4px; }

    .wn { font-size:0.56rem; letter-spacing:1px; text-transform:uppercase; color:var(--light); }
    .wd { font-size:0.5rem; color:var(--muted); }
  </style>
</head>

    var fetchAttempts = 0;

    // 🔥 MAXIMUM RELIABILITY: 6 primárních zdrojů + 8 proxy fallbacků
    // VŠECHNY KOMBINACE se zkusí paralelně
    var ENDPOINTS = [
      { url: 'https://listen.housetime.fm/status-json.xsl', type: 'icecast', priority: 1 },
      { url: 'https://www.housetime.fm/trackliste', type: 'trackliste', priority: 2 },
      { url: 'https://housetime.fm/api/current', type: 'api', priority: 3 },
      { url: 'https://weareone.fm/housetime', type: 'trackliste', priority: 4 },
    ];

    // 🛡️ FALLBACK PROXY SERVERY — když přímý fetch selže
    var PROXY_URLS = [
      null, // Přímý fetch — PRVNÍ PRIORITA
      function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); },
      function(u) { return 'https://api.allorigins.win/get?url=' + encodeURIComponent(u); },

      function(u) { return 'https://yacdn.org/serve/' + encodeURIComponent(u); },
    ];

    function fetchWithTimeout(url, ms, opts) {
      var ctrl = new AbortController();
      var id = setTimeout(function() { ctrl.abort(); }, ms);
      return fetch(url, Object.assign({ signal: ctrl.signal }, opts || {}))
        .finally(function() { clearTimeout(id); });
    }

    // 💾 CACHE SYSTEM: Uklád čas, aby se vědělo když je stará
    function loadCache() {
      try {
        var cached = localStorage.getItem('housetime-cache');
        if (cached) {
          var data = JSON.parse(cached);
          var age = (Date.now() - data.timestamp) / 1000 / 60; // věk v minutách
          // Cache je platná max 15 minut (aby byla přesná)
          if (age < 15 && (data.artist || data.song)) {
            return data;
          }
        }
      } catch(e) {}
      return null;
    }

    function saveCache(artist, song) {
      try {
        localStorage.setItem('housetime-cache', JSON.stringify({
          artist: artist,
          song: song,
          timestamp: Date.now()
        }));
      } catch(e) {}

      showLoading();

    function tryAllSourcesParallel() {
      var resolved = false;

    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* LIGHTBOX */
  #cd-lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);justify-content:center;align-items:center;}
  #cd-lightbox.open{display:flex;}
  #cd-lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:6px;box-shadow:0 0 40px rgba(74,158,255,.15);}
  #cd-lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:2rem;cursor:pointer;opacity:.7;}
  #cd-lightbox-close:hover{opacity:1;}

  /* DRAG & DROP */
  .record-card[draggable] { cursor: grab; }
  .record-card.dragging { opacity: .35; transform: scale(.97); }
  .record-card.drag-over { border-color: var(--accent) !important; box-shadow: 0 0 12px rgba(74,158,255,.3); }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"><\/script>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="app-title">KLADYXLAND</div>
      <div class="app-subtitle">Moje CD <span style="font-size:.55rem;color:rgba(255,255,255,.2);font-family:monospace;margin-left:6px;">ver.1.2.CD</span></div>
    </div>
    <div class="count-badge" id="countBadge">0 CD</div>
  </div>
  <div class="sync-bar">
    <button class="sync-btn" onclick="exportJSON()">⬇ Export</button>
    <span id="sync-dot" style="font-size:.75rem;color:#4a6d90;letter-spacing:.05em;margin-left:auto;align-self:center;">⏳ Načítám...</span>
    <button class="sync-btn" style="border-color:var(--accent);color:var(--accent);" onclick="cdSaveOrder()">💾 Sestava</button>
    <button class="sync-btn" onclick="document.getElementById('importFileInput').click()">⬆ Import</button>
    <input type="file" id="importFileInput" accept=".json" onchange="importJSON(event)">
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('kolekce', this)">Kolekce</button>
    <button class="tab" onclick="switchTab('oblibene', this)">♥ Oblíbené</button>
    <button class="tab" onclick="switchTab('statistiky', this)">Statistiky</button>
    <button class="tab" onclick="switchTab('seznam', this)">Seznam</button>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <input class="search-input" id="searchInput" oninput="render()" placeholder="Hledat v kolekci..." type="text">
</div>
<div id="sortBar" style="display:flex;gap:6px;padding:0 16px 10px;align-items:center;">
  <span style="font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.3);text-transform:uppercase;font-family:monospace;margin-right:4px;">Řadit:</span>
  <button id="sortNone" onclick="setSort('none')" style="font-family:monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(0,245,255,.4);background:rgba(0,245,255,.15);color:#00f5ff;cursor:pointer;">Výchozí</button>
  <button id="sortArtist" onclick="setSort('artist')" style="font-family:monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.4);cursor:pointer;">A-Z Interpret</button>
  <button id="sortTitle" onclick="setSort('title')" style="font-family:monospace;font-size:9px;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.4);cursor:pointer;">A-Z Název</button>
</div>

<main id="mainContent"></main>

<button class="fab" onclick="openModal()">
  <span style="font-size:18px">+</span> Přidat CD
</button>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nové CD</h2>

    <div class="form-group">
      <label class="form-label">Interpret</label>
      <input class="form-input" id="fArtist" placeholder="např. Daft Punk" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Název alba</label>
      <input class="form-input" id="fTitle" placeholder="např. Random Access Memories" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Rok vydání</label>
      <input class="form-input" id="fYear" placeholder="např. 2013" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Žánr</label>
      <select class="form-select" id="fGenre">
        <option value="Rock">Rock</option>
        <option value="Jazz">Jazz</option>
        <option value="Pop">Pop</option>
        <option value="Dance">Dance</option>
        <option value="Klasika">Klasika</option>
        <option value="Blues">Blues</option>
        <option value="Folk">Folk</option>
        <option value="Soul">Soul</option>
        <option value="Electronic">Electronic</option>
        <option value="Metal">Metal</option>
        <option value="Hip-Hop">Hip-Hop</option>
        <option value="Jiné">Jiné</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Hodnocení</label>
      <div class="rating-picker">
        <button class="star-btn" data-val="1" onclick="setRating(1)">★</button>
        <button class="star-btn" data-val="2" onclick="setRating(2)">★</button>
        <button class="star-btn" data-val="3" onclick="setRating(3)">★</button>
        <button class="star-btn" data-val="4" onclick="setRating(4)">★</button>
        <button class="star-btn" data-val="5" onclick="setRating(5)">★</button>
      </div>
    </div>

    <div class="photo-section">
      <label class="photo-label">📸 Obal CD</label>
      <div class="photo-btn-group">
        <button type="button" class="photo-btn" onclick="capturePhoto()">📷 Vyfotit</button>
        <button type="button" class="photo-btn" onclick="uploadPhoto()">📁 Vybrat</button>
      </div>
      <div id="cdDropZone" ondragover="event.preventDefault();this.style.borderColor='var(--accent2)'" ondragleave="this.style.borderColor='rgba(255,255,255,.1)'" ondrop="cdHandleDrop(event)" style="border:2px dashed rgba(255,255,255,.1);border-radius:8px;padding:12px;text-align:center;cursor:pointer;color:rgba(255,255,255,.35);font-size:.78rem;margin-top:8px;transition:border-color .2s;">
        📁 Přetáhni obal sem (PC)
      </div>
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(event)">
      <img class="photo-preview" id="photoPreview">
      <button type="button" class="photo-clear-btn" id="photoClearBtn" style="display:none;" onclick="clearPhoto()">Smazat fotku</button>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="saveRecord()">Přidat do sbírky</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── FIREBASE SYNC ─────────────────────────────────────────────
  const _fbConfig = {
    apiKey: "AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",
    authDomain: "kladyxland.firebaseapp.com",
    databaseURL: "https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kladyxland",
    storageBucket: "kladyxland.firebasestorage.app",
    messagingSenderId: "178078059030",
    appId: "1:178078059030:web:8d8a0271b23a7aca2b4337"
  };
  if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
  const _db = firebase.database();
  const _storage = firebase.storage();
  const _cdRef = _db.ref('cdRecordsDb');

  function _setSyncStatus(msg, color) {
    const el = document.getElementById('sync-dot');
    if (el) { el.textContent = msg; el.style.color = color || '#4a6d90'; }
  }
  // ──────────────────────────────────────────────────────────────

  const GENRE_COLORS = {
    Rock: '#c45c3a', Jazz: '#5a9ec4', Pop: '#c45a9e',
    Klasika: '#9ec45a', Blues: '#5ac49e', Folk: '#c4a45a',
    Soul: '#e8a04a', Electronic: '#4ab8e8', Metal: '#888',
    'Hip-Hop': '#c4843a', Jiné: '#aaa'
  };

  let records = JSON.parse(localStorage.getItem('cd_records') || '[]');
  let currentRating = 0;
  let currentTab = 'kolekce';
  let editingId = null;
  let currentPhoto = null;
  let currentPhotoFile = null;

  let _cdSaving = false;

  function cdSaveOrder() {
    save();
    showToast('Sestava uložena ✓');
  }

  function save() {
    _cdSaving = true;
    setTimeout(() => { _cdSaving = false; }, 3000);
    records.forEach((r, i) => { r.order = i; });
    localStorage.setItem('cd_records', JSON.stringify(records));
    updateBadge();
    const obj = {};
    records.forEach(r => { obj['id_' + r.id] = r; });
    _setSyncStatus('⏳ Ukládám...', '#f39c12');
    _cdRef.set(obj)
      .then(() => _setSyncStatus('✅ Synchronizováno', '#2ecc71'))
      .catch(e => { console.error('Firebase save error:', e); _setSyncStatus('❌ Chyba sync', '#e74c3c'); });
  }

  function updateBadge() {
    const n = records.length;
    document.getElementById('countBadge').textContent = n + ' CD';
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const sb = document.getElementById('searchBar');
    sb.style.display = (tab === 'statistiky' || tab === 'seznam') ? 'none' : 'block';
    render();
  }

  function render() {
    if (currentTab === 'statistiky') renderStats();
    else if (currentTab === 'seznam') renderSeznam();
    else renderList();
  }

  let currentSort = 'none';
  function setSort(type) {
    currentSort = type;
    ['sortNone','sortArtist','sortTitle'].forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.style.background = 'transparent';
      btn.style.borderColor = 'rgba(255,255,255,.15)';
      btn.style.color = 'rgba(255,255,255,.4)';
    });
    const activeId = type === 'none' ? 'sortNone' : type === 'artist' ? 'sortArtist' : 'sortTitle';
    const active = document.getElementById(activeId);
    if (active) { active.style.background = 'rgba(0,245,255,.15)'; active.style.borderColor = 'rgba(0,245,255,.4)'; active.style.color = '#00f5ff'; }
    render();
  }

  function renderList() {
    const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
    let list = records.filter(r => {
      const match = r.artist.toLowerCase().includes(query) || r.title.toLowerCase().includes(query);
      if (currentTab === 'oblibene') return match && r.fav;
      return match;
    });
    if (currentSort === 'artist') list = [...list].sort((a, b) => a.artist.localeCompare(b.artist, 'cs'));
    else if (currentSort === 'title') list = [...list].sort((a, b) => a.title.localeCompare(b.title, 'cs'));

    const main = document.getElementById('mainContent');
    if (list.length === 0) {
      main.innerHTML = \`<div class="empty">
        <div class="empty-disc">💿</div>
        <h3>\${currentTab === 'oblibene' ? 'Žádné oblíbené' : 'Sbírka je prázdná'}</h3>
        <p>\${currentTab === 'oblibene' ? 'Klikni na srdíčko u CD,<br>aby se zobrazilo zde.' : 'Přidej své první CD<br>tlačítkem níže.'}</p>
      </div>\`;
      return;
    }

    main.innerHTML = list.map((r, i) => {
      const color = GENRE_COLORS[r.genre] || '#888';
      const stars = '★'.repeat(r.rating || 0) + '☆'.repeat(5 - (r.rating || 0));
      return \`<div class="record-card" draggable="true" data-id="\${r.id}" style="animation-delay:\${i * 0.05}s" ondragstart="cdDragStart(event)" ondragover="cdDragOver(event)" ondragleave="cdDragLeave(event)" ondrop="cdDrop(event)">
        \${r.photo ? \`<img src="\${r.photo}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer;" onclick="cdOpenLightbox('\${r.photo}')">\` : \`<div class="vinyl">
          <div class="vinyl-label"></div>
        </div>\`}
        <div class="record-info">
          <div class="record-artist">\${r.artist}</div>
          <div class="record-title">\${r.title}</div>
          <div class="record-meta">
            <span class="record-year">\${r.year || '—'}</span>
            <span class="record-genre">\${r.genre}</span>
            \${r.rating ? \`<span class="stars" style="color:\${color}">\${stars}</span>\` : ''}
          </div>
        </div>
        <div class="record-actions">
          <button class="btn-icon fav \${r.fav ? 'on' : ''}" onclick="toggleFav(\${r.id}, event)" title="Oblíbené">♥</button>
          <button class="btn-icon edit" onclick="editRecord(\${r.id}, event)" title="Upravit">✎</button>
          <button class="btn-icon delete" onclick="deleteRecord(\${r.id}, event)" title="Smazat">✕</button>
        </div>
      </div>\`;
    }).join('');
  }

  function renderStats() {
    const main = document.getElementById('mainContent');
    if (records.length === 0) {
      main.innerHTML = \`<div class="empty"><div class="empty-disc">💿</div><h3>Zatím žádná data</h3><p>Přidej CD pro zobrazení statistik.</p></div>\`;
      return;
    }

    const genres = {};
    let totalRating = 0, rated = 0;
    records.forEach(r => {
      genres[r.genre] = (genres[r.genre] || 0) + 1;
      if (r.rating) { totalRating += r.rating; rated++; }
    });

    const topGenre = Object.entries(genres).sort((a,b) => b[1]-a[1])[0];
    const avgRating = rated ? (totalRating / rated).toFixed(1) : '—';
    const favCount = records.filter(r => r.fav).length;
    const maxGenre = topGenre[1];

    main.innerHTML = \`
      <div class="stats-grid">
        <div class="stat-card" style="animation-delay:0s"><div class="stat-value">\${records.length}</div><div class="stat-label">Celkem CD</div></div>
        <div class="stat-card" style="animation-delay:0.05s"><div class="stat-value">\${favCount}</div><div class="stat-label">Oblíbených</div></div>
        <div class="stat-card" style="animation-delay:0.1s"><div class="stat-value">\${avgRating}</div><div class="stat-label">Průměrné hodnocení</div></div>
        <div class="stat-card" style="animation-delay:0.15s"><div class="stat-value">\${Object.keys(genres).length}</div><div class="stat-label">Různých žánrů</div></div>
      </div>
      <div class="section-label">Žánry v kolekci</div>
      <div class="genre-list">
        \${Object.entries(genres).sort((a,b)=>b[1]-a[1]).map(([g, n], i) => \`
          <div class="genre-row" style="animation-delay:\${0.2 + i*0.05}s">
            <span style="color:\${GENRE_COLORS[g]||'#aaa'};min-width:70px">\${g}</span>
            <div class="genre-bar-wrap"><div class="genre-bar" style="width:\${(n/maxGenre)*100}%;background:\${GENRE_COLORS[g]||'#aaa'}"></div></div>
            <span style="color:var(--muted);font-size:12px">\${n}</span>
          </div>\`).join('')}
      </div>\`;
  }

  function openModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Nové CD';
    document.getElementById('submitBtn').textContent = 'Přidat do sbírky';
    document.getElementById('modalOverlay').classList.add('open');
    currentRating = 0;
    currentPhoto = null;
    currentPhotoFile = null;
    document.getElementById('fArtist').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fYear').value = '';
    document.getElementById('fGenre').value = 'Rock';
    updateStars();
    clearPhotoDisplay();
    setTimeout(() => document.getElementById('fArtist').focus(), 300);
  }

  function editRecord(id, e) {
    e.stopPropagation();
    const record = records.find(r => r.id === id);
    if (!record) return;

    editingId = id;
    document.getElementById('modalTitle').textContent = 'Upravit CD';
    document.getElementById('submitBtn').textContent = 'Uložit změny';

    document.getElementById('fArtist').value = record.artist;
    document.getElementById('fTitle').value = record.title;
    document.getElementById('fYear').value = record.year || '';
    document.getElementById('fGenre').value = record.genre;
    currentRating = record.rating || 0;
    updateStars();

    currentPhoto = (record.photo && record.photo.startsWith('http')) ? record.photo : null;
    currentPhotoFile = null;
    if (currentPhoto) {
      document.getElementById('photoPreview').src = currentPhoto;
      document.getElementById('photoPreview').classList.add('show');
      document.getElementById('photoClearBtn').style.display = 'block';
    } else {
      clearPhotoDisplay();
    }

    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fArtist').focus(), 300);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function setRating(val) {
    currentRating = val;
    updateStars();
  }

  function updateStars() {
    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.val) <= currentRating);
    });
  }

  async function saveRecord() {
    const artist = document.getElementById('fArtist').value.trim();
    const title = document.getElementById('fTitle').value.trim();

    if (!artist || !title) {
      document.getElementById('fArtist').style.borderColor = artist ? '' : 'var(--accent2)';
      document.getElementById('fTitle').style.borderColor = title ? '' : 'var(--accent2)';
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Ukládám...';

    let photoURL = (currentPhoto && currentPhoto.startsWith('http')) ? currentPhoto : null;
    if (currentPhotoFile) {
      try {
        const compressed = await compressImage(currentPhotoFile);
        const ref = _storage.ref('cd/' + Date.now() + '_' + compressed.name);
        await ref.put(compressed);
        photoURL = await ref.getDownloadURL();
        currentPhoto = photoURL;
        currentPhotoFile = null;
      } catch(e) { console.error('Upload fotky selhal:', e); }
    }

    const recordData = {
      artist,
      title,
      year: document.getElementById('fYear').value || '',
      genre: document.getElementById('fGenre').value,
      rating: currentRating,
      photo: photoURL
    };

    if (editingId !== null) {
      const record = records.find(r => r.id === editingId);
      if (record) { Object.assign(record, recordData); }
    } else {
      records.push({
        id: Date.now(),
        ...recordData,
        fav: false
      });
    }

    btn.disabled = false;
    btn.textContent = editingId !== null ? 'Uložit změny' : 'Přidat do sbírky';
    save();
    closeModal();
    if (currentTab !== 'kolekce') switchTab('kolekce', document.querySelector('.tab'));
    else render();
  }

  function renderSeznam() {
    const main = document.getElementById('mainContent');
    if (records.length === 0) {
      main.innerHTML = \`<div class="empty"><div class="empty-disc">💿</div><h3>Sbírka je prázdná</h3><p>Přidej CD tlačítkem níže.</p></div>\`;
      return;
    }
    const sorted = [...records].sort((a, b) => a.artist.localeCompare(b.artist));
    main.innerHTML = \`
      <div style="padding:16px 16px 0;">
        <button onclick="exportCSV()" style="width:100%;padding:13px;background:var(--accent);border:none;color:#fff;font-weight:700;font-size:.95rem;border-radius:10px;cursor:pointer;letter-spacing:.04em;">⬇ Exportovat jako CSV</button>
      </div>
      <div style="padding:12px 16px 80px;">
        <table style="width:100%;border-collapse:collapse;font-size:.85rem;">
          <thead>
            <tr style="border-bottom:2px solid var(--accent);color:var(--muted);text-align:left;">
              <th style="padding:8px 6px;">#</th>
              <th style="padding:8px 6px;">Interpret</th>
              <th style="padding:8px 6px;">Album</th>
              <th style="padding:8px 6px;">Rok</th>
              <th style="padding:8px 6px;">Žánr</th>
              <th style="padding:8px 6px;">★</th>
            </tr>
          </thead>
          <tbody>
            \${sorted.map((r, i) => \`
              <tr style="border-bottom:1px solid rgba(255,255,255,.07);">
                <td style="padding:8px 6px;color:var(--muted);">\${i + 1}</td>
                <td style="padding:8px 6px;font-weight:600;">\${r.artist}</td>
                <td style="padding:8px 6px;">\${r.title}</td>
                <td style="padding:8px 6px;color:var(--muted);">\${r.year || '—'}</td>
                <td style="padding:8px 6px;color:var(--muted);">\${r.genre || '—'}</td>
                <td style="padding:8px 6px;">\${'★'.repeat(r.rating || 0)}</td>
              </tr>\`).join('')}
          </tbody>
        </table>
      </div>\`;
  }

  function exportCSV() {
    const sorted = [...records].sort((a, b) => a.artist.localeCompare(b.artist));
    const header = ['#', 'Interpret', 'Album', 'Rok', 'Zanr', 'Hodnoceni', 'Oblibene'];
    const rows = sorted.map((r, i) => [
      i + 1,
      '"' + (r.artist || '').replace(/"/g, '""') + '"',
      '"' + (r.title || '').replace(/"/g, '""') + '"',
      r.year || '',
      '"' + (r.genre || '').replace(/"/g, '""') + '"',
      r.rating || 0,
      r.fav ? 'Ano' : 'Ne'
    ]);
    const csv = [header, ...rows].map(r => r.join(',')).join('\\n');
    const blob = new Blob(['\\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kladyxland_cd_databaze.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function deleteRecord(id, e) {
    e.stopPropagation();
    records = records.filter(r => r.id !== id);
    save();
    render();
  }

  function toggleFav(id, e) {
    e.stopPropagation();
    const r = records.find(r => r.id === id);
    if (r) { r.fav = !r.fav; save(); render(); }
  }

  // FOTOAPARÁT FUNKCE

      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => resolve(new File([blob], file.name, {type:'image/jpeg'})), 'image/jpeg', quality);
      };
      img.src = url;
    });
  }

  .item-card[draggable] { cursor: grab; }
  .item-card.dragging { opacity: .35; transform: scale(.97); }
  .item-card.drag-over { border-color: var(--accent) !important; box-shadow: 0 0 12px rgba(0,245,255,.3); }
</style>

<body>

<header>
  <div class="header-top">
    <div class="logo-wrap">
      <div class="logo-icon">🎛️</div>
      <div>
        <div class="app-title">KLADYXLAND</div>
        <div class="app-subtitle">Studio Manager <span style="font-size:.55rem;color:rgba(255,255,255,.2);font-family:monospace;margin-left:6px;">ver.1.7HW</span></div>
      </div>
    </div>
    <div class="count-badge" id="countBadge">0 položek</div>
  </div>
  <div class="sync-bar">
    <button class="sync-btn" onclick="exportJSON()">⬇ Export</button>
    <span id="sync-dot" style="font-size:.75rem;color:#4a6d90;letter-spacing:.05em;margin-left:auto;align-self:center;">⏳ Načítám...</span>
    <button class="sync-btn" style="border-color:var(--accent);color:var(--accent);" onclick="hwSaveOrder()">💾 Sestava</button>
    <button class="sync-btn" onclick="document.getElementById('importFileInput').click()">⬆ Import</button>
    <input type="file" id="importFileInput" accept=".json" onchange="importJSON(event)">
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('vse', this)">Vše</button>
    <button class="tab" onclick="switchTab('oblibene', this)">★ Oblíbené</button>
    <button class="tab" onclick="switchTab('hardware', this)">Hardware</button>
    <button class="tab" onclick="switchTab('software', this)">Software</button>
    <button class="tab" onclick="switchTab('prislusenstvi', this)">Příslušenství</button>
    <button class="tab" onclick="switchTab('statistiky', this)">Statistiky</button>
    <button class="tab" onclick="switchTab('seznam', this)">Seznam</button>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <input class="search-input" id="searchInput" oninput="render()" placeholder="Hledat vybavení..." type="text">
</div>

<main id="mainContent"></main>

<button class="fab" onclick="openModal()"><span style="font-size:16px">+</span> Přidat položku</button>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nová položka</h2>

    <div class="form-group">
      <label class="form-label">Kategorie</label>
      <select class="form-select" id="fCat" onchange="updateCatIcon()">
        <option value="Hardware">🎛️ Hardware</option>
        <option value="Software">💿 Software</option>
        <option value="Příslušenství">🎧 Příslušenství</option>
        <option value="Světla">💡 Světla / AV</option>
        <option value="Kabely">🔌 Kabely</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Název</label>
      <input class="form-input" id="fName" placeholder="např. Pioneer CDJ-3000" type="text">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Výrobce / Brand</label>
        <input class="form-input" id="fBrand" placeholder="Pioneer DJ" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Sériové číslo</label>
        <input class="form-input" id="fSerial" placeholder="nepovinné" type="text">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Rok / Verze</label>
        <input class="form-input" id="fYear" placeholder="2022" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Cena (Kč)</label>
        <input class="form-input" id="fPrice" placeholder="nepovinné" type="number">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Stav</label>
      <div class="status-picker">
        <div class="status-opt active-ok" id="sOk" onclick="setStatus('ok')">✓ Funkční</div>
        <div class="status-opt" id="sRepair" onclick="setStatus('repair')">⚠ V opravě</div>
        <div class="status-opt" id="sOff" onclick="setStatus('off')">✕ Vyřazeno</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Poznámky</label>
      <textarea class="form-textarea" id="fNotes" placeholder="Umístění, stav, licence…"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Fotka (volitelné)</label>
      <div id="hwDropZone" onclick="document.getElementById('fPhoto').click()" ondragover="event.preventDefault();this.style.borderColor='#00f5ff'" ondragleave="this.style.borderColor='rgba(0,245,255,.25)'" ondrop="hwHandleDrop(event)" style="border:2px dashed rgba(0,245,255,.25);border-radius:8px;padding:16px;text-align:center;cursor:pointer;color:rgba(0,245,255,.5);font-size:.8rem;transition:border-color .2s;">
        📁 Klikni nebo přetáhni fotku sem
      </div>
      <input class="form-input" id="fPhoto" type="file" accept="image/*" onchange="previewPhoto()" style="display:none;">
      <div id="photoPreview" style="margin-top:8px;max-width:100%;border-radius:6px;overflow:hidden;"></div>
      <button type="button" id="hwPhotoClearBtn" onclick="hwClearPhoto()" style="display:none;margin-top:6px;background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4);color:#e74c3c;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.78rem;">✕ Smazat fotku</button>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="saveItem()">Přidat do inventáře</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── FIREBASE SYNC ─────────────────────────────────────────────
  const _fbConfig = {
    apiKey: "AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",
    authDomain: "kladyxland.firebaseapp.com",
    databaseURL: "https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kladyxland",
    storageBucket: "kladyxland.firebasestorage.app",
    messagingSenderId: "178078059030",
    appId: "1:178078059030:web:8d8a0271b23a7aca2b4337"
  };
  if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
  const _db = firebase.database();
  const _storage = firebase.storage();
  const _hwRef = _db.ref('hardwareDb');

  function _setSyncStatus(msg, color) {
    const el = document.getElementById('sync-dot');
    if (el) { el.textContent = msg; el.style.color = color || '#4a6d90'; }
  }
  // ──────────────────────────────────────────────────────────────

  const CAT_ICONS = {
    'Hardware':'🎛️','Software':'💿','Příslušenství':'🎧','Světla':'💡','Kabely':'🔌'
  };
  const CAT_COLORS = {
    'Hardware':'#3a8fff','Software':'#a855f7','Příslušenství':'#2ecc71',
    'Světla':'#f39c12','Kabely':'#e74c3c'
  };

  let items = JSON.parse(localStorage.getItem('kladyx_items') || '[]');
  let currentTab = 'vse';
  let currentStatus = 'ok';
  let editingId = null; // ID položky, která se edituje (null = přidávání nové)

  let _hwSaving = false;

  function hwSaveOrder() {
    save();
    showToast('Sestava uložena ✓');
  }

  function save() {
    _hwSaving = true;
    setTimeout(() => { _hwSaving = false; }, 3000);
    // Přidat order index každé položce
    items.forEach((it, i) => { it.order = i; });
    localStorage.setItem('kladyx_items', JSON.stringify(items));
    updateBadge();
    // Uložit do Firebase – konvertuj array na objekt keyed by id
    const obj = {};
    items.forEach(it => { obj['id_' + it.id] = it; });
    _setSyncStatus('⏳ Ukládám...', '#f39c12');
    _hwRef.set(obj)
      .then(() => _setSyncStatus('✅ Synchronizováno', '#2ecc71'))
      .catch(e => { console.error('Firebase save error:', e); _setSyncStatus('❌ Chyba sync', '#e74c3c'); });
  }

  function updateBadge() {
    const n = items.length;
    document.getElementById('countBadge').textContent = n + (n===1?' položka':n<5?' položky':' položek');
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('searchBar').style.display = (tab==='statistiky'||tab==='seznam') ? 'none' : 'block';
    render();
  }

  function render() {
    if (currentTab === 'statistiky') renderStats();
    else if (currentTab === 'seznam') renderSeznam();
    else renderList();
  }

  function renderList() {
    const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
    let list = items.filter(it => {
      const match = it.name.toLowerCase().includes(q) || it.brand.toLowerCase().includes(q);
      if (currentTab === 'oblibene') return match && it.fav;
      if (currentTab === 'hardware') return match && it.cat === 'Hardware';
      if (currentTab === 'software') return match && it.cat === 'Software';
      if (currentTab === 'prislusenstvi') return match && (it.cat==='Příslušenství'||it.cat==='Kabely'||it.cat==='Světla');
      return match;
    });

    const main = document.getElementById('mainContent');
    if (!list.length) {
      main.innerHTML = \`<div class="empty"><div class="empty-icon">🎛️</div><h3>Žádné vybavení</h3><p>Přidej první položku<br>do svého studia.</p></div>\`;
      return;
    }

    main.innerHTML = list.map((it, i) => {
      const color = CAT_COLORS[it.cat]||'#3a8fff';
      const dotClass = it.status==='ok'?'status-ok':it.status==='repair'?'status-repair':'status-off';
      const statusText = it.status==='ok'?'Funkční':it.status==='repair'?'V opravě':'Vyřazeno';
      return \`<div class="item-card" draggable="true" data-id="\${it.id}" style="animation-delay:\${i*0.045}s" ondragstart="hwDragStart(event)" ondragover="hwDragOver(event)" ondragleave="hwDragLeave(event)" ondrop="hwDrop(event)">
        <div class="item-icon" style="background:\${color}18;border-color:\${color}44">
          \${it.photo ? \`<img src="\${it.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;cursor:pointer;" onclick="hwOpenLightbox('\${it.photo}')">\` : CAT_ICONS[it.cat]||'🎵'}
        </div>
        <div class="item-info">
          <div class="item-category">\${it.cat}</div>
          <div class="item-name">\${it.name}</div>
          <div class="item-brand">\${it.brand}\${it.year?' · '+it.year:''}</div>
          <div class="item-meta">
            <span class="status-dot \${dotClass}"></span>
            <span class="status-label">\${statusText}</span>
            \${it.serial?\`<span class="tag">S/N: \${it.serial}</span>\`:''}
            \${it.price?\`<span class="tag">\${Number(it.price).toLocaleString('cs')} Kč</span>\`:''}
            \${it.photo?\`<span class="tag">📷</span>\`:''}
          </div>
          \${it.notes?\`<div style="font-size:11px;color:var(--muted);margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">\${it.notes}</div>\`:''}
        </div>
        <div class="item-actions">
          <button class="btn-icon fav \${it.fav?'on':''}" onclick="toggleFav(\${it.id},event)" title="Důležité">★</button>
          <button class="btn-icon edit" onclick="editItem(\${it.id},event)" title="Upravit">✎</button>
          <button class="btn-icon delete" onclick="deleteItem(\${it.id},event)" title="Smazat">✕</button>
        </div>
      </div>\`;
    }).join('');
  }

  function renderStats() {
    const main = document.getElementById('mainContent');
    if (!items.length) {
      main.innerHTML = \`<div class="empty"><div class="empty-icon">📊</div><h3>Zatím žádná data</h3><p>Přidej vybavení pro zobrazení statistik.</p></div>\`;
      return;
    }
    const ok = items.filter(i=>i.status==='ok').length;
    const repair = items.filter(i=>i.status==='repair').length;
    const off = items.filter(i=>i.status==='off').length;
    const totalVal = items.reduce((s,i)=>s+(+i.price||0),0);
    const cats = {};
    items.forEach(i=>{ cats[i.cat]=(cats[i.cat]||0)+1; });
    const maxCat = Math.max(...Object.values(cats));

    main.innerHTML = \`
      <div class="stats-grid">
        <div class="stat-card" style="animation-delay:0s"><div class="stat-value">\${items.length}</div><div class="stat-label">Celkem položek</div></div>
        <div class="stat-card" style="animation-delay:0.05s"><div class="stat-value">\${totalVal?totalVal.toLocaleString('cs')+' Kč':'—'}</div><div class="stat-label">Celková hodnota</div></div>
      </div>
      <div class="section-label">Stav vybavení</div>
      <div class="status-summary">
        <div class="ss-card" style="animation-delay:0.1s"><div class="ss-val" style="color:var(--green)">\${ok}</div><div class="ss-lbl">Funkční</div></div>
        <div class="ss-card" style="animation-delay:0.13s"><div class="ss-val" style="color:var(--orange)">\${repair}</div><div class="ss-lbl">V opravě</div></div>
        <div class="ss-card" style="animation-delay:0.16s"><div class="ss-val" style="color:var(--red)">\${off}</div><div class="ss-lbl">Vyřazeno</div></div>
      </div>
      <div class="section-label">Kategorie</div>
      <div class="cat-list">
        \${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,n],i)=>\`
          <div class="cat-row" style="animation-delay:\${0.2+i*0.05}s">
            <span style="color:\${CAT_COLORS[c]||'#3a8fff'};min-width:110px">\${CAT_ICONS[c]||''} \${c}</span>
            <div class="cat-bar-wrap"><div class="cat-bar" style="width:\${(n/maxCat)*100}%;background:\${CAT_COLORS[c]||'#3a8fff'}"></div></div>
            <span style="color:var(--muted);font-size:12px">\${n}</span>
          </div>\`).join('')}
      </div>\`;
  }

  function openModal() {
    editingId = null; // Přidávání nové položky
    document.getElementById('modalTitle').textContent = 'Nová položka';
    document.getElementById('submitBtn').textContent = 'Přidat do inventáře';
    document.getElementById('modalOverlay').classList.add('open');
    currentStatus = 'ok';
    ['fName','fBrand','fSerial','fYear','fPrice','fNotes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fCat').value = currentTab === 'software' ? 'Software' : currentTab === 'prislusenstvi' ? 'Příslušenství' : 'Hardware';
    document.getElementById('fPhoto').value = '';
    document.getElementById('photoPreview').innerHTML = '';
    window.currentPhotoData = null;
    window.currentPhotoFile = null;
    document.getElementById('hwPhotoClearBtn').style.display = 'none';
    updateStatusUI();
    setTimeout(()=>document.getElementById('fName').focus(), 300);
  }

  function editItem(id, e) {
    e.stopPropagation();
    const item = items.find(i => i.id === id);
    if (!item) return;

    editingId = id; // Nastavíme režim editace
    document.getElementById('modalTitle').textContent = 'Upravit položku';
    document.getElementById('submitBtn').textContent = 'Uložit změny';
    
    // Vyplníme formulář daty z položky
    document.getElementById('fCat').value = item.cat;
    document.getElementById('fName').value = item.name;
    document.getElementById('fBrand').value = item.brand === '—' ? '' : item.brand;
    document.getElementById('fSerial').value = item.serial || '';
    document.getElementById('fYear').value = item.year || '';
    document.getElementById('fPrice').value = item.price || '';
    document.getElementById('fNotes').value = item.notes || '';
    currentStatus = item.status || 'ok';
    
    // Načtení fotky
    window.currentPhotoData = (item.photo && item.photo.startsWith('http')) ? item.photo : null;
    const preview = document.getElementById('photoPreview');
    if (item.photo) {
      preview.innerHTML = \`<img src="\${item.photo}" style="width:100%;height:auto;display:block;">\`;
      document.getElementById('hwPhotoClearBtn').style.display = 'block';
    } else {
      preview.innerHTML = '';
    }
    document.getElementById('fPhoto').value = '';
    
    updateStatusUI();
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(()=>document.getElementById('fName').focus(), 300);
  }

  function closeModal() { 
    document.getElementById('modalOverlay').classList.remove('open'); 
    editingId = null;
  }
  
  function handleOverlayClick(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

  function setStatus(s) { currentStatus=s; updateStatusUI(); }
  
  function updateStatusUI() {
    document.getElementById('sOk').className = 'status-opt'+(currentStatus==='ok'?' active-ok':'');
    document.getElementById('sRepair').className = 'status-opt'+(currentStatus==='repair'?' active-repair':'');
    document.getElementById('sOff').className = 'status-opt'+(currentStatus==='off'?' active-off':'');
  }

  async function saveItem() {
    const name = document.getElementById('fName').value.trim();
    const brand = document.getElementById('fBrand').value.trim();
    
    if (!name) { 
      document.getElementById('fName').style.borderColor='var(--red)'; 
      return; 
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Ukládám...';

    let photoURL = (window.currentPhotoData && window.currentPhotoData.startsWith('http')) ? window.currentPhotoData : null;
    if (window.currentPhotoFile) {
      try {
        const compressed = await compressImage(window.currentPhotoFile);
        const ref = _storage.ref('hardware/' + Date.now() + '_' + compressed.name);
        await ref.put(compressed);
        photoURL = await ref.getDownloadURL();
      } catch(e) { console.error('Upload fotky selhal:', e); }
    }

    const itemData = {
      cat: document.getElementById('fCat').value,
      name,
      brand: brand||'—',
      serial: document.getElementById('fSerial').value.trim(),
      year: document.getElementById('fYear').value.trim(),
      price: document.getElementById('fPrice').value.trim(),
      notes: document.getElementById('fNotes').value.trim(),
      status: currentStatus,
      photo: photoURL
    };

    if (editingId !== null) {
      // Editace existující položky
      const item = items.find(i => i.id === editingId);
      if (item) {
        Object.assign(item, itemData);
      }
    } else {
      // Přidání nové položky
      items.push({
        id: Date.now(),
        ...itemData,
        fav: false
      });
    }

    save();
    btn.disabled = false;
    btn.textContent = editingId !== null ? 'Uložit změny' : 'Přidat do inventáře';
    closeModal();
    if (currentTab==='statistiky') switchTab('vse', document.querySelector('.tab'));
    else render();
  }


  function hwOpenLightbox(url) {
    document.getElementById('hw-lightbox-img').src = url;
    document.getElementById('hw-lightbox').classList.add('open');
  }

  function compressImage(file, maxWidth=1200, quality=0.75) {
    return new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => resolve(new File([blob], file.name, {type:'image/jpeg'})), 'image/jpeg', quality);
      };
      img.src = url;
    });
  }

  function hwClearPhoto() {
    window.currentPhotoFile = null;
    window.currentPhotoData = null;
    document.getElementById('photoPreview').innerHTML = '';
    document.getElementById('fPhoto').value = '';
    document.getElementById('hwPhotoClearBtn').style.display = 'none';
  }

  let hwDragSrcId = null;

  function hwDragStart(e) {
    hwDragSrcId = parseInt(e.currentTarget.dataset.id);
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function hwDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  }

  function hwDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }

  function hwDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    const targetId = parseInt(e.currentTarget.dataset.id);
    if (hwDragSrcId === targetId) return;
    const srcIdx = items.findIndex(i => i.id === hwDragSrcId);
    const tgtIdx = items.findIndex(i => i.id === targetId);
    if (srcIdx === -1 || tgtIdx === -1) return;
    const [moved] = items.splice(srcIdx, 1);
    items.splice(tgtIdx, 0, moved);
    render();
  }

  function hwHandleDrop(e) {
    e.preventDefault();
    document.getElementById('hwDropZone').style.borderColor = 'rgba(0,245,255,.25)';
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    window.currentPhotoFile = file;
    const url = URL.createObjectURL(file);
    document.getElementById('photoPreview').innerHTML = \`<img src="\${url}" style="width:100%;height:auto;display:block;">\`;
    document.getElementById('hwPhotoClearBtn').style.display = 'block';
  }

  function previewPhoto() {
    const fileInput = document.getElementById('fPhoto');
    const preview = document.getElementById('photoPreview');
    const file = fileInput.files[0];
    if (file) {
      window.currentPhotoFile = file;
      const url = URL.createObjectURL(file);
      preview.innerHTML = \`<img src="\${url}" style="width:100%;height:auto;display:block;">\`;
    } else {
      window.currentPhotoFile = null;
      preview.innerHTML = '';
    }
  }

  function renderSeznam() {
    const main = document.getElementById('mainContent');
    if (!items.length) {
      main.innerHTML = \`<div class="empty"><h3>Inventář je prázdný</h3><p>Přidej položku tlačítkem níže.</p></div>\`;
      return;
    }
    const sorted = [...items].sort((a, b) => (a.brand||'').localeCompare(b.brand||'') || a.name.localeCompare(b.name));
    main.innerHTML = \`
      <div style="padding:16px 16px 0;">
        <button onclick="exportCSV()" style="width:100%;padding:13px;background:var(--accent);border:none;color:#fff;font-weight:700;font-size:.95rem;border-radius:10px;cursor:pointer;letter-spacing:.04em;">⬇ Exportovat jako CSV</button>
      </div>
      <div style="padding:12px 16px 80px;overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:.82rem;">
          <thead>

    Soul: '#e8a04a', Electronic: '#4ab8e8', Metal: '#888', Jiné: '#aaa'
  };

  let records = JSON.parse(localStorage.getItem('lp_records') || '[]');
  let currentRating = 0;
  let currentTab = 'kolekce';
  let editingId = null; // ID desky, která se edituje (null = přidávání nové)
  let currentPhoto = null;
  let currentPhotoFile = null;

  let _lpSaving = false;

  function lpSaveOrder() {
    save();
    showToast('Sestava uložena ✓');
  }

  function save() {
    _lpSaving = true;
    setTimeout(() => { _lpSaving = false; }, 3000);
    // Přidat order index každé desce
    records.forEach((r, i) => { r.order = i; });
    localStorage.setItem('lp_records', JSON.stringify(records));
    updateBadge();
    // Uložit do Firebase – konvertuj array na objekt keyed by id
    const obj = {};
    records.forEach(r => { obj['id_' + r.id] = r; });
    _setSyncStatus('⏳ Ukládám...', '#f39c12');
    const fbOp = records.length === 0 ? _lpRef.remove() : _lpRef.set(obj);
    fbOp
      .then(() => _setSyncStatus('✅ Synchronizováno', '#2ecc71'))
      .catch(e => { console.error('Firebase save error:', e); _setSyncStatus('❌ Chyba sync', '#e74c3c'); });
  }

  function updateBadge() {
    const n = records.length;
    document.getElementById('countBadge').textContent = n + (n === 1 ? ' deska' : n < 5 ? ' desky' : ' desek');
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const sb = document.getElementById('searchBar');
    sb.style.display = (tab === 'statistiky' || tab === 'seznam') ? 'none' : 'block';
    render();
  }

  function render() {
    if (currentTab === 'statistiky') renderStats();
    else if (currentTab === 'seznam') renderSeznam();
    else renderList();
  }

  let currentSort = 'none';
  function setSort(type) {
    currentSort = type;
    ['sortNone','sortArtist','sortTitle'].forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.style.background = 'transparent';
      btn.style.borderColor = 'rgba(255,255,255,.15)';
      btn.style.color = 'rgba(255,255,255,.4)';
    });
    const activeId = type === 'none' ? 'sortNone' : type === 'artist' ? 'sortArtist' : 'sortTitle';
    const active = document.getElementById(activeId);
    if (active) { active.style.background = 'rgba(0,245,255,.15)'; active.style.borderColor = 'rgba(0,245,255,.4)'; active.style.color = '#00f5ff'; }
    render();
  }

  function renderList() {
    const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
    let list = records.filter(r => {
      const match = r.artist.toLowerCase().includes(query) || r.title.toLowerCase().includes(query);
      if (currentTab === 'oblibene') return match && r.fav;
      return match;
    });
    if (currentSort === 'artist') list = [...list].sort((a, b) => a.artist.localeCompare(b.artist, 'cs'));
    else if (currentSort === 'title') list = [...list].sort((a, b) => a.title.localeCompare(b.title, 'cs'));

    const main = document.getElementById('mainContent');
    if (list.length === 0) {
      main.innerHTML = \`<div class="empty">
        <div class="empty-disc">◉</div>
        <h3>\${currentTab === 'oblibene' ? 'Žádné oblíbené' : 'Sbírka je prázdná'}</h3>
        <p>\${currentTab === 'oblibene' ? 'Klikni na srdíčko u desky,<br>aby se zobrazila zde.' : 'Přidej svou první LP desku<br>tlačítkem níže.'}</p>
      </div>\`;
      return;
    }

    main.innerHTML = list.map((r, i) => {
      const color = GENRE_COLORS[r.genre] || '#888';
      const stars = '★'.repeat(r.rating || 0) + '☆'.repeat(5 - (r.rating || 0));
      return \`<div class="record-card" draggable="true" data-id="\${r.id}" style="animation-delay:\${i * 0.05}s" ondragstart="lpDragStart(event)" ondragover="lpDragOver(event)" ondragleave="lpDragLeave(event)" ondrop="lpDrop(event)">
        \${r.photo ? \`<img src="\${r.photo}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer;" onclick="lpOpenLightbox('\${r.photo}')">\` : \`<div class="vinyl">
          <div class="vinyl-label" style="background:\${color}">\${r.genre.substring(0,2).toUpperCase()}</div>
        </div>\`}
        <div class="record-info">
          <div class="record-artist">\${r.artist}</div>
          <div class="record-title">\${r.title}</div>
          <div class="record-meta">
            <span class="record-year">\${r.year || '—'}</span>
            <span class="record-genre">\${r.genre}</span>
            \${r.rating ? \`<span class="stars" style="color:\${color}">\${stars}</span>\` : ''}
          </div>
        </div>
        <div class="record-actions">
          <button class="btn-icon fav \${r.fav ? 'on' : ''}" onclick="toggleFav(\${r.id}, event)" title="Oblíbené">♥</button>
          <button class="btn-icon edit" onclick="editRecord(\${r.id}, event)" title="Upravit">✎</button>
          <button class="btn-icon delete" onclick="deleteRecord(\${r.id}, event)" title="Smazat">✕</button>
        </div>
      </div>\`;
    }).join('');
  }

  function renderStats() {
    const main = document.getElementById('mainContent');
    if (records.length === 0) {
      main.innerHTML = \`<div class="empty"><div class="empty-disc">◉</div><h3>Zatím žádná data</h3><p>Přidej desky pro zobrazení statistik.</p></div>\`;
      return;
    }

    const genres = {};
    let totalRating = 0, rated = 0;
    records.forEach(r => {
      genres[r.genre] = (genres[r.genre] || 0) + 1;
      if (r.rating) { totalRating += r.rating; rated++; }
    });

    const topGenre = Object.entries(genres).sort((a,b) => b[1]-a[1])[0];
    const avgRating = rated ? (totalRating / rated).toFixed(1) : '—';
    const favCount = records.filter(r => r.fav).length;
    const maxGenre = topGenre[1];

    main.innerHTML = \`
      <div class="stats-grid">
        <div class="stat-card" style="animation-delay:0s"><div class="stat-value">\${records.length}</div><div class="stat-label">Celkem desek</div></div>
        <div class="stat-card" style="animation-delay:0.05s"><div class="stat-value">\${favCount}</div><div class="stat-label">Oblíbených</div></div>
        <div class="stat-card" style="animation-delay:0.1s"><div class="stat-value">\${avgRating}</div><div class="stat-label">Průměrné hodnocení</div></div>
        <div class="stat-card" style="animation-delay:0.15s"><div class="stat-value">\${Object.keys(genres).length}</div><div class="stat-label">Různých žánrů</div></div>
      </div>
      <div class="section-label">Žánry v kolekci</div>
      <div class="genre-list">
        \${Object.entries(genres).sort((a,b)=>b[1]-a[1]).map(([g, n], i) => \`
          <div class="genre-row" style="animation-delay:\${0.2 + i*0.05}s">
            <span style="color:\${GENRE_COLORS[g]||'#aaa'};min-width:70px">\${g}</span>
            <div class="genre-bar-wrap"><div class="genre-bar" style="width:\${(n/maxGenre)*100}%;background:\${GENRE_COLORS[g]||'#aaa'}"></div></div>
            <span style="color:var(--muted);font-size:12px">\${n}</span>
          </div>\`).join('')}
      </div>\`;
  }

  function openModal() {
    editingId = null; // Přidávání nové desky
    document.getElementById('modalTitle').textContent = 'Nová deska';
    document.getElementById('submitBtn').textContent = 'Přidat do sbírky';
    document.getElementById('modalOverlay').classList.add('open');
    currentRating = 0;
    currentPhoto = null;
    document.getElementById('fArtist').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fYear').value = '';
    document.getElementById('fGenre').value = 'Rock';
    clearPhotoDisplay();
    setTimeout(() => document.getElementById('fArtist').focus(), 300);
  }

  function editRecord(id, e) {
    e.stopPropagation();
    const record = records.find(r => r.id === id);
    if (!record) return;

    editingId = id; // Nastavíme režim editace
    document.getElementById('modalTitle').textContent = 'Upravit desku';
    document.getElementById('submitBtn').textContent = 'Uložit změny';
    
    // Vyplníme formulář daty z desky
    document.getElementById('fArtist').value = record.artist;
    document.getElementById('fTitle').value = record.title;
    document.getElementById('fYear').value = record.year || '';
    document.getElementById('fGenre').value = record.genre;
    currentRating = record.rating || 0;
    
    // Fotka
    currentPhoto = (record.photo && record.photo.startsWith('http')) ? record.photo : null;
    if (currentPhoto) {
      document.getElementById('photoPreview').src = currentPhoto;
      document.getElementById('photoPreview').classList.add('show');
      document.getElementById('photoClearBtn').style.display = 'block';
    } else {
      clearPhotoDisplay();
    }
    
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fArtist').focus(), 300);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function setRating(val) {
    currentRating = val;
    updateStars();
  }

  function updateStars() {
    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.val) <= currentRating);
    });
  }

  async function saveRecord() {
    const artist = document.getElementById('fArtist').value.trim();
    const title = document.getElementById('fTitle').value.trim();
    
    if (!artist || !title) {
      document.getElementById('fArtist').style.borderColor = artist ? '' : 'var(--accent2)';
      document.getElementById('fTitle').style.borderColor = title ? '' : 'var(--accent2)';
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Ukládám...';

    let photoURL = (currentPhoto && currentPhoto.startsWith('http')) ? currentPhoto : null;
    if (currentPhotoFile) {
      try {
        const compressed = await compressImage(currentPhotoFile);
        const ref = _storage.ref('lp/' + Date.now() + '_' + compressed.name);
        await ref.put(compressed);
        photoURL = await ref.getDownloadURL();
        currentPhoto = photoURL;
        currentPhotoFile = null;
      } catch(e) { console.error('Upload fotky selhal:', e); }
    }

    const recordData = {
      artist,
      title,
      year: document.getElementById('fYear').value || '',
      genre: document.getElementById('fGenre').value,
      rating: currentRating,
      photo: photoURL
    };

    if (editingId !== null) {
      // Editace existující desky
      const record = records.find(r => r.id === editingId);
      if (record) {
        Object.assign(record, recordData);
      }
    } else {
      // Přidání nové desky
      records.push({
        id: Date.now(),
        ...recordData,
        fav: false
      });
    }

    btn.disabled = false;
    btn.textContent = editingId !== null ? 'Uložit změny' : 'Přidat do sbírky';
    save();
    closeModal();
    if (currentTab !== 'kolekce') switchTab('kolekce', document.querySelector('.tab'));
    else render();
  }

  function renderSeznam() {
    const main = document.getElementById('mainContent');
    if (records.length === 0) {
      main.innerHTML = \`<div class="empty"><div class="empty-disc">◉</div><h3>Sbírka je prázdná</h3><p>Přidej desky tlačítkem níže.</p></div>\`;
      return;
    }
    const sorted = [...records].sort((a, b) => a.artist.localeCompare(b.artist));
    main.innerHTML = \`
      <div style="padding:16px 16px 0;">
        <button onclick="exportCSV()" style="width:100%;padding:13px;background:var(--accent);border:none;color:#fff;font-weight:700;font-size:.95rem;border-radius:10px;cursor:pointer;letter-spacing:.04em;">⬇ Exportovat jako CSV</button>
      </div>
      <div style="padding:12px 16px 80px;">
        <table style="width:100%;border-collapse:collapse;font-size:.85rem;">
          <thead>
            <tr style="border-bottom:2px solid var(--accent);color:var(--muted);text-align:left;">
              <th style="padding:8px 6px;">#</th>
              <th style="padding:8px 6px;">Interpret</th>
              <th style="padding:8px 6px;">Album</th>
              <th style="padding:8px 6px;">Rok</th>
              <th style="padding:8px 6px;">Žánr</th>
              <th style="padding:8px 6px;">★</th>
            </tr>
          </thead>
          <tbody>
            \${sorted.map((r, i) => \`
              <tr style="border-bottom:1px solid rgba(255,255,255,.07);">
                <td style="padding:8px 6px;color:var(--muted);">\${i + 1}</td>
                <td style="padding:8px 6px;font-weight:600;">\${r.artist}</td>
                <td style="padding:8px 6px;">\${r.title}</td>
                <td style="padding:8px 6px;color:var(--muted);">\${r.year || '—'}</td>
                <td style="padding:8px 6px;color:var(--muted);">\${r.genre || '—'}</td>
                <td style="padding:8px 6px;">\${'★'.repeat(r.rating || 0)}</td>
              </tr>\`).join('')}
          </tbody>
        </table>
      </div>\`;
  }

  function exportCSV() {
    const sorted = [...records].sort((a, b) => a.artist.localeCompare(b.artist));
    const header = ['#', 'Interpret', 'Album', 'Rok', 'Zanr', 'Hodnoceni', 'Oblibene'];
    const rows = sorted.map((r, i) => [
      i + 1,
      '"' + (r.artist || '').replace(/"/g, '""') + '"',
      '"' + (r.title || '').replace(/"/g, '""') + '"',
      r.year || '',
      '"' + (r.genre || '').replace(/"/g, '""') + '"',
      r.rating || 0,
      r.fav ? 'Ano' : 'Ne'
    ]);
    const csv = [header, ...rows].map(r => r.join(',')).join('\\n');
    const blob = new Blob(['\\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kladyxland_lp_desky.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function deleteRecord(id, e) {
    e.stopPropagation();
    records = records.filter(r => r.id !== id);
    save();
    render();
  }

  function toggleFav(id, e) {
    e.stopPropagation();
    const r = records.find(r => r.id === id);
    if (r) { r.fav = !r.fav; save(); render(); }
  }

  // FOTOAPARÁT FUNKCE

  function lpOpenLightbox(url) {
    document.getElementById('lp-lightbox-img').src = url;
    document.getElementById('lp-lightbox').classList.add('open');
  }

  function compressImage(file, maxWidth=1200, quality=0.75) {
    return new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => resolve(new File([blob], file.name, {type:'image/jpeg'})), 'image/jpeg', quality);
      };
      img.src = url;
    });
  }

  let lpDragSrcId = null;

  function lpDragStart(e) {
    lpDragSrcId = parseInt(e.currentTarget.dataset.id);
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function lpDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  }

  function lpDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }

  function lpDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    const targetId = parseInt(e.currentTarget.dataset.id);
    if (lpDragSrcId === targetId) return;
    const srcIdx = records.findIndex(r => r.id === lpDragSrcId);
    const tgtIdx = records.findIndex(r => r.id === targetId);
    if (srcIdx === -1 || tgtIdx === -1) return;
    const [moved] = records.splice(srcIdx, 1);
    records.splice(tgtIdx, 0, moved);
    render();
  }

  function lpHandleDrop(e) {
    e.preventDefault();
    document.getElementById('lpDropZone').style.borderColor = 'rgba(255,255,255,.1)';
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    currentPhotoFile = file;
    currentPhoto = null;
    const url = URL.createObjectURL(file);
    document.getElementById('photoPreview').src = url;
    document.getElementById('photoPreview').classList.add('show');
    document.getElementById('photoClearBtn').style.display = 'block';
  }

  function capturePhoto() {
    const input = document.getElementById('photoInput');
    input.setAttribute('capture', 'environment');
    input.click();
  }

  function uploadPhoto() {
    const input = document.getElementById('photoInput');
    input.removeAttribute('capture');
    input.click();
  }

  function handlePhotoSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    currentPhotoFile = file;
    const url = URL.createObjectURL(file);
    currentPhoto = null; // bude nahrazeno URL po uploadu
    document.getElementById('photoPreview').src = url;
    document.getElementById('photoPreview').classList.add('show');
    document.getElementById('photoClearBtn').style.display = 'block';
    document.getElementById('photoInput').value = '';
  }

  function clearPhoto() {
    currentPhoto = null;
    currentPhotoFile = null;
    clearPhotoDisplay();
  }

  function clearPhotoDisplay() {
    document.getElementById('photoPreview').classList.remove('show');
    document.getElementById('photoPreview').src = '';
    document.getElementById('photoClearBtn').style.display = 'none';
  }

  // === EXPORT / IMPORT ===
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function exportJSON() {
    if (records.length === 0) { showToast('Žádná data k exportu'); return; }
    const data = JSON.stringify(records, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'lp_desky_backup.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Export hotový ✓');
  }

  function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error('Neplatný formát');
        const valid = imported.every(r => r.artist && r.title);
        if (!valid) throw new Error('Chybí povinná pole');

        if (confirm(\`Importovat \${imported.length} desek?\\nStávající data budou nahrazena.\`)) {
          records = imported;
          save();
          render();
          showToast(\`Importováno \${imported.length} desek ✓\`);
        }
      } catch (err) {
        showToast('Chyba: neplatný soubor');
      }
      event.target.value = '';
    };
    reader.readAsText(file);
  }

  // ── FIREBASE REAL-TIME LISTENER ───────────────────────────────
  const _DEMO_LP = [
    { id: 1, artist: 'Pink Floyd', title: 'The Dark Side of the Moon', year: '1973', genre: 'Rock', rating: 5, fav: true },
    { id: 2, artist: 'Miles Davis', title: 'Kind of Blue', year: '1959', genre: 'Jazz', rating: 5, fav: true },
    { id: 3, artist: 'Led Zeppelin', title: 'IV', year: '1971', genre: 'Rock', rating: 4, fav: false },
    { id: 4, artist: 'Joni Mitchell', title: 'Blue', year: '1971', genre: 'Folk', rating: 5, fav: false },
  ];

  
  // ── Timeout fallback: pokud Firebase nereaguje do 5s ──
  setTimeout(function() {
    if (_firstLpLoad) {
      _firstLpLoad = false;
      var stored = localStorage.getItem('kladyx_lp_items');
      if (stored) {
        try { items = JSON.parse(stored); } catch(e) {}
      } else {
        items = _DEMO_LP || [];
      }
      render();
      var el = document.getElementById('sync-dot');
      if (el) { el.textContent = '📴 Offline'; el.style.color = '#e67e22'; }
    }
  }, 5000);
  // ─────────────────────────────────────────────────────
  
  let _firstLpLoad = true;
  _lpRef.on('value', (snapshot) => {
    const fbData = snapshot.val();
    if (_firstLpLoad) {
      _firstLpLoad = false;
      if (!fbData) {
        // Firebase prázdný – nahraj lokální data nebo demo
        if (records.length === 0) { records = _DEMO_LP; }
        save();
      } else {
        records = Object.values(fbData).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
        localStorage.setItem('lp_records', JSON.stringify(records));
      }
      updateBadge();
      render();
      _setSyncStatus('✅ Synchronizováno', '#2ecc71');
      return;
    }
    // Aktualizace z jiného zařízení
    if (_lpSaving) return; // ignoruj vlastní zápis
    if (fbData) {
      const fbRecords = Object.values(fbData).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      if (JSON.stringify(fbRecords) !== JSON.stringify(records)) {
        records = fbRecords;
        localStorage.setItem('lp_records', JSON.stringify(records));
        updateBadge();
        render();
        _setSyncStatus('🔄 Synchronizováno', '#2ecc71');
      }
    }
  }, (error) => {
    console.error('Firebase listener error:', error);
    _setSyncStatus('❌ Offline', '#e74c3c');
    // Fallback na localStorage
    updateBadge();
    render();
  });
  // ──────────────────────────────────────────────────────────────
<\/script>

<div id="lp-lightbox" onclick="document.getElementById('lp-lightbox').classList.remove('open')">
  <span id="lp-lightbox-close">✕</span>
  <img id="lp-lightbox-img" src="" alt="">
</div>
<div style="text-align:center;padding:8px;font-size:.6rem;color:rgba(255,255,255,.2);font-family:monospace;">ver.1.9.LP</div>
</body>
</html>
`;

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #00d4ff;
      --primary-dark: #0077aa;
      --accent: #ff006e;
      --accent2: #a855f7;
      --bg-dark: #06081a;
      --bg-card: rgba(12, 16, 42, 0.95);
      --text-primary: #e8eaef;
      --text-dim: #6b7294;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    .bg-gradient {
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(0,212,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(255,0,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(168,85,247,0.04) 0%, transparent 60%);
    }

    .bg-grid {
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 20s linear infinite;
    }

    @keyframes gridDrift {
      0%   { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    /* ── Floating particles ── */
    .particles {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0;
      animation: particleFloat linear infinite;
    }
    .particle:nth-child(odd) { background: var(--accent); }
    .particle:nth-child(3n)  { background: var(--accent2); width: 2px; height: 2px; }

    @keyframes particleFloat {
      0%   { opacity: 0; transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }

    /* ── Main container ── */
    .container {
      width: 100%; max-width: 920px;
      position: relative; z-index: 2;
      animation: containerIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes containerIn {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card {
      background: var(--bg-card);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 20px;
      padding: 0;
      overflow: hidden;

        0 0 80px rgba(0,212,255,0.1),
        0 25px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      position: relative;
    }

    /* Top glow bar */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 5%, var(--primary) 30%, var(--accent) 50%, var(--accent2) 70%, transparent 95%);
      z-index: 10;
    }

    /* ── Header ── */
    .header {
      padding: 45px 40px 30px;
      text-align: center;
      position: relative;
    }

    .logo-ring {
      width: 90px; height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 2px solid rgba(0,212,255,0.4);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      animation: ringPulse 3s ease-in-out infinite;
    }

    .logo-ring::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(0,212,255,0.15);
      animation: ringRotate 8s linear infinite;
      border-top-color: var(--accent);
    }

    .logo-ring::after {
      content: '';
      position: absolute; inset: -12px;
      border-radius: 50%;
      border: 1px dashed rgba(168,85,247,0.2);
      animation: ringRotate 12s linear infinite reverse;
    }

    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0,212,255,0.2); }
      50%      { box-shadow: 0 0 40px rgba(0,212,255,0.4); }
    }

    @keyframes ringRotate { to { transform: rotate(360deg); } }

    .logo-icon {
      font-size: 38px;
      animation: discSpin 4s linear infinite;
    }

    @keyframes discSpin { to { transform: rotate(360deg); } }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 6px;

      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,212,255,0.3));

      color: var(--text-dim);

      font-weight: 400;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-top: 12px;

    .eq-strip {
      display: flex;
      justify-content: center;
      align-items: flex-end;

      padding: 0 40px;

      100% { height: var(--h); }

        0 0 50px rgba(0,212,255,0.2),

    .player-wrapper::before,

      content: '';

      width: 20px; height: 20px;
      border-color: var(--primary);
      border-style: solid;
      z-index: 5;
      opacity: 0.5;
    }
    .player-wrapper::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
      border-radius: 14px 0 0 0;
    }
    .player-wrapper::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 14px 0;
    }

    iframe {

      border: none; display: block;
    }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 25px 35px;
      border-top: 1px solid rgba(0,212,255,0.08);

    /* ── Ticker ── */
    .ticker-wrap {
      width: 100%; overflow: hidden;
      background: linear-gradient(90deg, rgba(0,212,255,0.08), rgba(168,85,247,0.08));
      border-bottom: 1px solid rgba(0,212,255,0.12);

    .ticker-wrap::before, .ticker-wrap::after {
      content: '';

    .ticker-wrap::before { left: 0; background: linear-gradient(90deg, var(--bg-dark), transparent); }
    .ticker-wrap::after  { right: 0; background: linear-gradient(-90deg, var(--bg-dark), transparent); }
    .ticker-track {

    .ticker-item {

  </style>

  <script>
  // ── Web Audio API vizualizace (jen owner) ─────────────────────────────
  let _audioActive = false;
  let _audioStream = null;
  let _audioCtx = null;
  let _drawActive = false;

  function stopAudioViz() {
    _audioActive = false;
    _drawActive = false;
    if (_audioStream) { _audioStream.getTracks().forEach(t => t.stop()); _audioStream = null; }
    if (_audioCtx) { _audioCtx.close(); _audioCtx = null; }
    // Obnovit CSS animace
    document.querySelectorAll('.eq-bar').forEach(b => { b.style.animation = ''; b.style.height = ''; b.style.opacity = ''; });
    document.querySelectorAll('.sig-bar').forEach(b => { b.style.animation = ''; b.style.height = ''; b.style.opacity = ''; });
    const btn = document.getElementById('audio-viz-btn');
    if (btn) { btn.textContent = '🎙 VIZ OFF'; btn.style.borderColor = 'rgba(0,212,255,.4)'; btn.style.color = 'rgba(0,212,255,.7)'; }
  }

  async function startAudioViz() {
    if (_audioActive) { stopAudioViz(); return; }
    try {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error('Mikrofon není dostupný v tomto prostředí.');
      }
      _audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

      const source = _audioCtx.createMediaStreamSource(_audioStream);

</div>

    </div>
