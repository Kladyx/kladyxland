<div id="report-print-target"></div>

<script>
// ── CONSTANTS ──
const MONTHS=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const MONTHS_SHORT=['Led','Úno','Bře','Dub','Kvě','Čvn','Čvc','Srp','Zář','Říj','Lis','Pro'];
const SK='utility-records';

const today = new Date();
const todayYM = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');

let currentMonth = todayYM; // 'YYYY-MM'

// ── FIREBASE SYNC ──
const _fbConfig = {
  apiKey: "AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",
  authDomain: "kladyxland.firebaseapp.com",
  databaseURL: "https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kladyxland",
  storageBucket: "kladyxland.firebasestorage.app",
  messagingSenderId: "178078059030",
  appId: "1:178078059030:web:8d8a0271b23a7aca2b4337"
};
if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
const _db = firebase.database();
const _odRef = _db.ref('odectyDb');
let _odSaving = false;

// Auto anonymous sign-in – nutné pro přístup k Firebase RTDB
firebase.auth().signInAnonymously().catch(e => console.warn('Anon auth:', e));

function _setSyncStatus(msg, color) {
  const el = document.getElementById('sync-dot');
  if (el) { el.textContent = msg; el.style.color = color || '#4a6d90'; }
}

// ── STORAGE ──
let _records = JSON.parse(localStorage.getItem(SK)||'{"water":[],"gas":[],"electric":[]}');

function getRecords(){ return _records; }

function saveRecords(r){
  _records = r;
  localStorage.setItem(SK, JSON.stringify(r));
  _odSaving = true;
  setTimeout(()=>{ _odSaving=false; }, 3000);
  _setSyncStatus('⏳ Ukládám...', '#f39c12');
  _odRef.set(r)
    .then(()=> _setSyncStatus('✅ Synchronizováno', '#2ecc71'))
    .catch(e=>{ console.error(e); _setSyncStatus('❌ Chyba sync', '#e74c3c'); });
}

// Firebase real-time listener
let _firstLoad = true;
setTimeout(function(){
  if(_firstLoad){
    _firstLoad=false;
    _setSyncStatus('📴 Offline','#e67e22');
  }
},5000);

_odRef.on('value', (snapshot)=>{
  const fb = snapshot.val();
  if(_firstLoad){
    _firstLoad=false;
    if(fb && (fb.water||fb.gas||fb.electric)){
      _records = {
        water: fb.water||[],
        gas: fb.gas||[],
        electric: fb.electric||[]
      };
      localStorage.setItem(SK, JSON.stringify(_records));
    } else if(_records.water||_records.gas||_records.electric){
      saveRecords(_records); // push local → Firebase
    }
    refresh();
    _setSyncStatus('✅ Synchronizováno', '#2ecc71');
    return;
  }
  if(_odSaving) return;
  if(fb && (fb.water||fb.gas||fb.electric)){
    const incoming = {water:fb.water||[],gas:fb.gas||[],electric:fb.electric||[]};
    if(JSON.stringify(incoming)!==JSON.stringify(_records)){
      _records = incoming;
      localStorage.setItem(SK, JSON.stringify(_records));
      refresh();
      _setSyncStatus('🔄 Aktualizuji...', '#2ecc71');
    }
  }
},(err)=>{
  console.error(err);
  _setSyncStatus('❌ Offline','#e74c3c');
});

function getVal(records,type,ym){
  const r=records[type].find(x=>x.date.startsWith(ym));
  return r?r.value:null;
}
function hasVal(records,type,ym){ return getVal(records,type,ym)!==null; }

function setVal(type,ym,value){
  let r=getRecords();
  r[type]=r[type].filter(x=>!x.date.startsWith(ym));
  if(value!==null) r[type].push({value:parseFloat(value),date:ym+'-01'});
  r[type].sort((a,b)=>new Date(a.date)-new Date(b.date));
  saveRecords(r);
}

function deleteVal(type,ym){ setVal(type,ym,null); }
function deleteMonth(ym){
  let r=getRecords();
  ['water','gas','electric'].forEach(t=>{ r[t]=r[t].filter(x=>!x.date.startsWith(ym)); });
  saveRecords(r);
}

// ── FORMAT ──
function fmtMonth(ym){
  const [y,m]=ym.split('-');
  return MONTHS[parseInt(m)-1]+' '+y;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── MONTH BAR ──
function renderMonthBar(){
  const bar=document.getElementById('month-bar'); bar.innerHTML='';
  const yr=parseInt(currentMonth.split('-')[0]);
  for(let m=1;m<=12;m++){
    const ym=yr+'-'+String(m).padStart(2,'0');
    const r=getRecords();
    const hasW=hasVal(r,'water',ym), hasG=hasVal(r,'gas',ym), hasE=hasVal(r,'electric',ym);
    const isToday=ym===todayYM;
    const isActive=ym===currentMonth;

    const b=document.createElement('button');
    b.style.paddingBottom='16px';
    let cls='month-btn';
    if(isToday) cls+=' today-month';
    if(isActive) cls+=' active';
    b.className=cls;
    b.innerHTML=MONTHS_SHORT[m-1]+
      '<div class="month-dots">'+
        '<div class="mdot'+(hasW?' w':'')+'"></div>'+
        '<div class="mdot'+(hasG?' g':'')+'"></div>'+
        '<div class="mdot'+(hasE?' e':'')+'"></div>'+
      '</div>';
    b.onclick=()=>{ currentMonth=ym; refresh(); };
    bar.appendChild(b);
  }
  document.getElementById('month-label').textContent=fmtMonth(currentMonth);
}

// ── INPUT CARDS ──
function renderInputCards(){
  const r=getRecords();
  const types=[
    {key:'water',icon:'💧',name:'VODA',unit:'m³',cls:'water-card',nameCls:'water'},
    {key:'gas',  icon:'🔥',name:'PLYN',unit:'m³',cls:'gas-card',  nameCls:'gas'},
    {key:'electric',icon:'⚡',name:'ELEKTŘINA',unit:'kWh',cls:'elec-card',nameCls:'elec'},
  ];
  const grid=document.getElementById('input-cards'); grid.innerHTML='';
  types.forEach(({key,icon,name,unit,cls,nameCls},i)=>{
    const val=getVal(r,key,currentMonth);
    const hasSaved=val!==null;
    const card=document.createElement('div');
    card.id='card-'+key;
    card.className='ucard '+cls+(hasSaved?' has-value':'');
    card.style.animationDelay=(i*.06)+'s';
    card.innerHTML=\`
      <div class="ucard-top">
        <span class="ucard-icon">\${icon}</span>
        <span class="ucard-name \${nameCls}">\${name}</span>
        <span class="ucard-unit">\${unit}</span>
      </div>
      <div class="ucard-saved">
        \${hasSaved
          ? \`<span class="saved-label">ULOŽENO</span><span class="saved-val">\${val} <span style="font-size:.6rem;font-weight:400;">\${unit}</span></span>\`
          : \`<span class="saved-empty">— není zadáno —</span>\`
        }
      </div>
      <input class="ucard-input" id="inp-\${key}" type="number" step="0.1" placeholder="\${hasSaved?'Přepsat hodnotu…':'Zadej odečet…'}"/>
      <div class="ucard-btns">
        <button class="btn-save" onclick="saveVal('\${key}')">✓ Uložit</button>
        \${hasSaved?\`<button class="btn-del-v" onclick="removeVal('\${key}')" title="Smazat hodnotu">✕</button>\`:''}
      </div>\`;
    grid.appendChild(card);
  });
}

function saveVal(type){
  const inp=document.getElementById('inp-'+type);
  const v=inp.value.trim();
  if(!v){ flash(inp); return; }
  setVal(type,currentMonth,v);
  refresh();
  // auto-advance if all done
  const r=getRecords();
  if(['water','gas','electric'].every(t=>hasVal(r,t,currentMonth))){
    const [y,m]=currentMonth.split('-').map(Number);
    const nd=new Date(y,m,1);
    const nm=nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0');
    setTimeout(()=>{ currentMonth=nm; refresh(); },800);
  }
}

function flash(inp){
  inp.style.borderColor='var(--warn)';
  setTimeout(()=>inp.style.borderColor='',600);
}

function removeVal(type){
  const r=getRecords();
  const val=getVal(r,type,currentMonth);
  if(val===null) return;
  const names={water:'Voda',gas:'Plyn',electric:'Elektřina'};
  // inline confirm inside the card
  const card=document.getElementById('card-'+type);
  const btns=card.querySelector('.ucard-btns');
  btns.innerHTML=\`<span style="font-size:.62rem;color:var(--warn);letter-spacing:.04em;">Smazat \${names[type]}?</span>
    <button class="btn-save" style="background:rgba(255,68,102,.15);border-color:rgba(255,68,102,.4);color:var(--warn);" id="cf-\${type}">ANO</button>
    <button class="btn-del-v" id="cn-\${type}">NE</button>\`;
  document.getElementById('cf-'+type).onclick=()=>{ deleteVal(type,currentMonth); refresh(); };
  document.getElementById('cn-'+type).onclick=()=>refresh();
}

// ── INPUT SUMMARY ──
function renderInputSummary(){
  const r=getRecords();
  const done=['water','gas','electric'].filter(t=>hasVal(r,t,currentMonth)).length;
  const miss=3-done;
  const hasAny=done>0;
  document.getElementById('s-done').textContent=done+' / 3';
  document.getElementById('s-miss').textContent=miss>0?miss:'—';
  document.getElementById('s-status').textContent=done===3?'✓ KOMPLETNÍ':done>0?'NEÚPLNÉ':'PRÁZDNÝ';
  document.getElementById('del-month-wrap').style.display=hasAny?'block':'none';
  const btn=document.getElementById('btn-del-this-month');
  btn.onclick=()=>{
    const wrap=document.getElementById('del-month-wrap');
    wrap.innerHTML=\`<div style="font-size:.63rem;color:var(--warn);margin-bottom:7px;letter-spacing:.04em;">Smazat celý měsíc \${fmtMonth(currentMonth)}?</div>
      <div style="display:flex;gap:8px;">
        <button class="btn-del-month" id="cf-month" style="background:rgba(255,68,102,.2);">ANO, smazat</button>
        <button class="btn-del-month" id="cn-month" style="border-color:rgba(200,216,232,.2);color:var(--muted);background:transparent;">Zrušit</button>
      </div>\`;
    document.getElementById('cf-month').onclick=()=>{ deleteMonth(currentMonth); refresh(); };
    document.getElementById('cn-month').onclick=()=>renderInputSummary();
  };
}

// ── PANEL SWITCH ──
function switchPanel(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(id==='archive') renderArchive();
  if(id==='yearly')  renderYearly();
  if(id==='report')  { populateYearFilter(); buildReport(); }
}

// ── ARCHIVE ──
function renderArchive(){
  const r=getRecords();
  const monthMap={};
  ['water','gas','electric'].forEach(t=>{
    r[t].forEach(x=>{
      const k=x.date.slice(0,7);
      if(!monthMap[k]) monthMap[k]={water:null,gas:null,electric:null};
      monthMap[k][t]=x.value;
    });
  });
  const keys=Object.keys(monthMap).sort().reverse();
  const el=document.getElementById('archive-content');
  if(!keys.length){ el.innerHTML='<div class="empty-msg">// žádné záznamy</div>'; return; }

  el.innerHTML=keys.map(ym=>{
    const d=monthMap[ym];
    const isToday=ym===todayYM;
    const ymid=ym.replace('-','');
    const rows=[
      {icon:'💧',name:'Voda',type:'water',unit:'m³',val:d.water},
      {icon:'🔥',name:'Plyn',type:'gas',unit:'m³',val:d.gas},
      {icon:'⚡',name:'Elektřina',type:'electric',unit:'kWh',val:d.electric},
    ];
    return \`<div class="arch-box">
      <div class="arch-head">
        <span class="arch-month-name">\${fmtMonth(ym)}</span>
        \${isToday?'<span class="arch-today-badge">● AKTUÁLNÍ</span>':''}
      </div>
      \${rows.map(({icon,name,type,unit,val})=>\`
        <div class="arch-row">
          <div class="arch-icon-name"><span class="arch-icon">\${icon}</span><span class="arch-name">\${name}</span></div>
          <div class="arch-right">
            \${val!==null
              ?\`<span class="arch-val">\${val} \${unit}</span>
                <button class="inline-del-btn" id="adv-\${type}-\${ymid}" onclick="archDelVal('\${type}','\${ym}')">✕</button>\`
              :\`<span class="arch-val missing">—</span>\`}
          </div>
        </div>\`).join('')}
      <div class="arch-del-row">
        <button class="btn-arch-del" id="adm-\${ymid}" onclick="archDelMonth('\${ym}')">🗑 SMAZAT CELÝ MĚSÍC</button>
      </div>
    </div>\`;
  }).join('');
}

function archDelVal(type,ym){
  const r=getRecords();
  const val=getVal(r,type,ym);
  if(val===null) return;
  const names={water:'Voda',gas:'Plyn',electric:'Elektřina'};
  // find the button that triggered this and replace inline
  const id='adv-'+type+'-'+ym.replace('-','');
  const btn=document.getElementById(id);
  if(!btn) return;
  const orig=btn.outerHTML;
  btn.outerHTML=\`<span id="adv-cf-wrap-\${type}">
    <button class="inline-del-btn" style="color:var(--warn);border-color:rgba(255,68,102,.5);" id="adv-cf-\${type}">ANO</button>
    <button class="inline-del-btn" style="color:var(--muted);border-color:rgba(200,216,232,.15);" id="adv-cn-\${type}">NE</button>
  </span>\`;
  document.getElementById('adv-cf-'+type).onclick=()=>{ deleteVal(type,ym); renderArchive(); renderMonthBar(); renderInputCards(); renderInputSummary(); };
  document.getElementById('adv-cn-'+type).onclick=()=>renderArchive();
}

function archDelMonth(ym){
  const id='adm-'+ym.replace('-','');
  const btn=document.getElementById(id);
  if(!btn) return;
  btn.outerHTML=\`<div id="adm-cf-wrap-\${ym.replace('-','')}">
    <div style="font-size:.6rem;color:var(--warn);margin-bottom:6px;">Smazat \${fmtMonth(ym)}?</div>
    <div style="display:flex;gap:7px;">
      <button class="btn-arch-del" style="background:rgba(255,68,102,.2);" id="adm-cf-\${ym.replace('-','')}">ANO, smazat</button>
      <button class="btn-arch-del" style="border-color:rgba(200,216,232,.15);color:var(--muted);background:transparent;" id="adm-cn-\${ym.replace('-','')}">Zrušit</button>
    </div>
  </div>\`;
  document.getElementById('adm-cf-'+ym.replace('-','')).onclick=()=>{ deleteMonth(ym); renderArchive(); renderMonthBar(); renderInputCards(); renderInputSummary(); };
  document.getElementById('adm-cn-'+ym.replace('-','')).onclick=()=>renderArchive();
}

// ── YEARLY ──
function renderYearly(){
  const r=getRecords();
  const monthMap={};
  ['water','gas','electric'].forEach(t=>{
    r[t].forEach(x=>{
      const k=x.date.slice(0,7);
      if(!monthMap[k]) monthMap[k]={water:null,gas:null,electric:null};
      monthMap[k][t]=x.value;
    });
  });
  const allMs=Object.keys(monthMap).sort();
  if(!allMs.length){ document.getElementById('yearly-content').innerHTML='<div class="empty-msg">// žádné záznamy</div>'; return; }

  const yearMap={};
  allMs.forEach(m=>{ const y=m.split('-')[0]; if(!yearMap[y]) yearMap[y]=[]; yearMap[y].push(m); });

  let html='';
  Object.keys(yearMap).sort().reverse().forEach(year=>{
    const yms=yearMap[year];
    html+=\`<div class="year-block">
      <div class="year-title">ROK \${year} &mdash; \${yms.length} měsíců</div>
      <div style="overflow-x:auto;">
      <table class="year-table">
        <thead><tr>
          <th>MĚSÍC</th>
          <th>💧 m³</th><th>Δ</th>
          <th>🔥 m³</th><th>Δ</th>
          <th>⚡ kWh</th><th>Δ</th>
        </tr></thead><tbody>\`;

    [...yms].reverse().forEach(m=>{
      const d=monthMap[m];
      const idx=allMs.indexOf(m);
      const prev=idx>0?monthMap[allMs[idx-1]]:null;
      const dW=(d.water!=null&&prev&&prev.water!=null)?(d.water-prev.water).toFixed(1):null;
      const dG=(d.gas!=null&&prev&&prev.gas!=null)?(d.gas-prev.gas).toFixed(1):null;
      const dE=(d.electric!=null&&prev&&prev.electric!=null)?(d.electric-prev.electric).toFixed(1):null;
      const fmtD=v=>v===null?'':
        \`<span style="font-size:.62rem;color:\${parseFloat(v)>=0?'rgba(0,255,136,.65)':'rgba(255,68,102,.75)'}">\${parseFloat(v)>=0?'+':''}\${v}</span>\`;
      html+=\`<tr>
        <td>\${fmtMonth(m)}</td>
        <td class="val">\${d.water!=null?d.water:'—'}</td><td>\${fmtD(dW)}</td>
        <td class="val">\${d.gas!=null?d.gas:'—'}</td><td>\${fmtD(dG)}</td>
        <td class="val">\${d.electric!=null?d.electric:'—'}</td><td>\${fmtD(dE)}</td>
      </tr>\`;
    });

    html+='</tbody></table></div>';

    // Yearly stats
    const allVals={water:[],gas:[],electric:[]};
    yms.forEach(m=>{ ['water','gas','electric'].forEach(t=>{ if(monthMap[m][t]!=null) allVals[t].push(monthMap[m][t]); }); });
    const gs=arr=>arr.length?{min:Math.min(...arr),max:Math.max(...arr),avg:(arr.reduce((a,b)=>a+b)/arr.length).toFixed(2),sum:arr.reduce((a,b)=>a+b,0).toFixed(2)}:null;

    html+='<div class="year-stats">';
    [['water','💧 Voda','m³'],['gas','🔥 Plyn','m³'],['electric','⚡ Elektřina','kWh']].forEach(([t,lbl,unit])=>{
      const s=gs(allVals[t]); if(!s) return;
      html+=\`<div class="year-stat-row">
        <span class="year-stat-label">\${lbl}</span>
        <span><span class="year-stat-val">\${s.sum} \${unit}</span>
        <span class="year-stat-sub">ø \${s.avg} · min \${s.min} · max \${s.max}</span></span>
      </div>\`;
    });
    html+='</div></div>';
  });
  document.getElementById('yearly-content').innerHTML=html;
}

// ── REPORT ──
function populateYearFilter(){
  const r=getRecords();
  const years=new Set();
  ['water','gas','electric'].forEach(t=>r[t].forEach(x=>years.add(x.date.split('-')[0])));
  const sel=document.getElementById('report-year-filter');
  const cur=sel.value;
  sel.innerHTML='<option value="all">Všechny roky</option>';
  [...years].sort().reverse().forEach(y=>{ const o=document.createElement('option'); o.value=y; o.textContent=y; if(y===cur) o.selected=true; sel.appendChild(o); });
}

function buildReport(){
  const r=getRecords();
  const fy=document.getElementById('report-year-filter').value;
  const mm={};
  ['water','gas','electric'].forEach(t=>{ r[t].forEach(x=>{ const y=x.date.split('-')[0]; if(fy!=='all'&&y!==fy) return; const k=x.date.slice(0,7); if(!mm[k]) mm[k]={water:null,gas:null,electric:null}; mm[k][t]=x.value; }); });
  const months=Object.keys(mm).sort();
  if(!months.length){ document.getElementById('report-preview').innerHTML='<div style="padding:20px;color:#888">Žádná data</div>'; return; }
  const now=new Date().toLocaleDateString('cs-CZ');
  const yl=fy==='all'?'Všechny záznamy':'Rok '+fy;
  const diff=(v,p)=>(v!=null&&p!=null)?(v-p).toFixed(2):null;
  const fD=d=>d===null?'—':(parseFloat(d)>=0?'+'+d:d);
  const fV=(v,u)=>v!=null?v+' '+u:'—';
  const yg={};
  months.forEach(m=>{ const y=m.split('-')[0]; if(!yg[y]) yg[y]=[]; yg[y].push(m); });
  let html=\`<div class="rpt-header"><h1>UTILITY TRACKER</h1><p>\${yl} &nbsp;|&nbsp; \${now}</p></div>\`;
  Object.keys(yg).sort().reverse().forEach(year=>{
    const ym=yg[year];
    html+=\`<div class="rpt-year-group"><div class="rpt-year-title">ROK \${year}</div>\`;
    [...ym].reverse().forEach(m=>{
      const idx=months.indexOf(m); const d=mm[m]; const prev=idx>0?mm[months[idx-1]]:null;
      const dW=diff(d.water,prev?prev.water:null);
      const dG=diff(d.gas,prev?prev.gas:null);
      const dE=diff(d.electric,prev?prev.electric:null);
      html+=\`<div class="rpt-month-block">
        <div class="rpt-month-header">\${fmtMonth(m)}</div>
        <table class="rpt-month-table">
          <tr><td class="rpt-icon">💧</td><td class="rpt-label">Voda</td><td class="rpt-val">\${fV(d.water,'m³')}</td><td class="rpt-diff-label">spotřeba</td><td class="rpt-diff\${dW!==null&&parseFloat(dW)<0?' neg':''}">\${fD(dW)}\${dW!==null?' m³':''}</td></tr>
          <tr><td class="rpt-icon">🔥</td><td class="rpt-label">Plyn</td><td class="rpt-val">\${fV(d.gas,'m³')}</td><td class="rpt-diff-label">spotřeba</td><td class="rpt-diff\${dG!==null&&parseFloat(dG)<0?' neg':''}">\${fD(dG)}\${dG!==null?' m³':''}</td></tr>
          <tr><td class="rpt-icon">⚡</td><td class="rpt-label">Elektřina</td><td class="rpt-val">\${fV(d.electric,'kWh')}</td><td class="rpt-diff-label">spotřeba</td><td class="rpt-diff\${dE!==null&&parseFloat(dE)<0?' neg':''}">\${fD(dE)}\${dE!==null?' kWh':''}</td></tr>
        </table></div>\`;
    });
    html+='</div>';
  });
  html+=\`<div class="rpt-footer"><span>UTILITY TRACKER — automaticky generovaná sestava</span><span>\${now}</span></div>\`;
  document.getElementById('report-preview').innerHTML=html;
}

function printReport(){
  const c=document.getElementById('report-preview');
  if(!c||!c.innerHTML.trim()||c.querySelector('.empty-msg')){alert('Nejprve vygeneruj sestavu.');return;}
  const pt=document.getElementById('report-print-target');
  pt.innerHTML='<div id="report-preview-print">'+c.innerHTML+'</div>';
  window.print();
  setTimeout(()=>pt.innerHTML='',500);
}

// ── EXPORT / IMPORT ──
document.getElementById('btn-export').onclick=()=>{
  const ta=document.getElementById('ta-export');
  ta.value=localStorage.getItem(SK)||'{}';
  ta.classList.add('show');
  document.getElementById('row-copy').style.display='block';
  document.getElementById('copy-msg').textContent='';
};
document.getElementById('btn-copy').onclick=()=>{
  const ta=document.getElementById('ta-export'); ta.select(); ta.setSelectionRange(0,99999);
  const msg=document.getElementById('copy-msg');
  try{ navigator.clipboard.writeText(ta.value).then(()=>{msg.textContent='✓ Zkopírováno!'}); }
  catch(e){ document.execCommand('copy'); msg.textContent='✓ Zkopírováno!'; }
};
document.getElementById('btn-import-show').onclick=()=>{
  const ta=document.getElementById('ta-import');
  ta.classList.toggle('show');
  document.getElementById('row-import-go').style.display=ta.classList.contains('show')?'block':'none';
};
document.getElementById('btn-import-go').onclick=()=>{
  const msg=document.getElementById('import-msg');

    refresh();
  }catch(e){ msg.className='ei-msg err'; msg.textContent='✗ Chybný formát dat.'; }
};

// ── MAIN REFRESH ──
function refresh(){
  renderMonthBar();

  renderInputSummary();
}

refresh();
<\/script>

`;

<script>
const MONTHS=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const SK='platby2026_';
const DEFAULT_MAY=[
  {name:"Telefon Amifox",amount:295,note:""},
  {name:"ČEZ",amount:1560,note:""},
  {name:"MND",amount:3600,note:""},
  {name:"ČT poplatky",amount:150,note:""},
  {name:"Natura Med",amount:199,note:""},
  {name:"Sweet TV",amount:60,note:""},
  {name:"Google Drive",amount:80,note:""},
  {name:"Cor Sat",amount:400,note:""},
  {name:"Rozhlas",amount:55,note:""},
  {name:"SM VAK",amount:1999,note:""},
  {name:"Popelnice Příbor",amount:732,note:"Zaplaceno 12.2.2026 z účtu",paid:true},
  {name:"Pojištění Uniqua",amount:100,note:""},
  {name:"Pojištění Vila Příbor",amount:1060,note:""},
  {name:"YouTube",amount:300,note:""},
  {name:"VDJ",amount:419,note:""},
  {name:"TP-Link",amount:130,note:""},
  {name:"Stream Mixcloud",amount:150,note:""},
];
let currentMonth=4, items=[], _platbySaving=false;

// ── FIREBASE ──
const _fbCfg={apiKey:"AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",authDomain:"kladyxland.firebaseapp.com",databaseURL:"https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",projectId:"kladyxland",storageBucket:"kladyxland.firebasestorage.app",messagingSenderId:"178078059030",appId:"1:178078059030:web:8d8a0271b23a7aca2b4337"};
if(!firebase.apps.length) firebase.initializeApp(_fbCfg);
const _db=firebase.database();
const _platbyRef=_db.ref('platbyDb');
function _setSyncStatus(msg,color){const el=document.getElementById('sync-dot');if(el){el.textContent=msg;el.style.color=color||'#4a6d90';}}

function _showLock(){document.getElementById('platby-lock').style.display='flex';document.getElementById('platby-main').style.display='none';}
function _hideLock(){document.getElementById('platby-lock').style.display='none';document.getElementById('platby-main').style.display='block';}

function _platbyLogin(){
  const pw=document.getElementById('platby-pw').value;
  const err=document.getElementById('platby-err');
  err.textContent='';
  firebase.auth().signInWithEmailAndPassword('kovalcikmichal@post.cz',pw)
    .then(()=>{document.getElementById('platby-pw').value='';})
    .catch(()=>{err.textContent='✗ Špatné heslo';});
}

let _dataInited=false;
function _initData(){
  if(_dataInited)return;
  _dataInited=true;

firebase.auth().onAuthStateChanged(user=>{
  if(user&&user.email){_hideLock();_initData();}else{_showLock();}
});

// ── STORAGE ──
function sKey(m){return SK+m;}
function _getAllLocal(){const all={};for(let i=0;i<12;i++){try{const r=localStorage.getItem(sKey(i));if(r)all[i]=JSON.parse(r);}catch(e){}}return all;}
function _applyAll(all){for(let i=0;i<12;i++){if(all[i]!==undefined){try{localStorage.setItem(sKey(i),JSON.stringify(all[i]));}catch(e){}}}  }
function loadMonth(m){try{const r=localStorage.getItem(sKey(m));if(r)return JSON.parse(r);}catch(e){}if(m===4)return DEFAULT_MAY.map((it,i)=>({id:i,name:it.name,amount:it.amount,note:it.note||'',paid:!!it.paid}));return[];}
function saveMonth(m,data){
  localStorage.setItem(sKey(m),JSON.stringify(data));
  _platbySaving=true;
  setTimeout(()=>{_platbySaving=false;},3000);
  _setSyncStatus('⏳ Ukládám...','#f39c12');
  _platbyRef.set(_getAllLocal())
    .then(()=>_setSyncStatus('✅ Synchronizováno','#2ecc71'))
    .catch(e=>{console.error(e);_setSyncStatus('❌ Chyba sync','#e74c3c');});
  bumpVer();showToast();
}

// Firebase real-time listener
let _firstLoad=true;
setTimeout(function(){if(_firstLoad){_firstLoad=false;_setSyncStatus('📴 Offline','#e67e22');}},5000);
_platbyRef.on('value',(snap)=>{
  const fb=snap.val();
  if(_firstLoad){
    _firstLoad=false;
    if(fb&&Object.keys(fb).length>0){
      _applyAll(fb);
    } else {
      const local=_getAllLocal();
      if(Object.keys(local).length>0) saveMonth(currentMonth,loadMonth(currentMonth));
    }
    items=loadMonth(currentMonth);
    renderMonthBar();renderCards();updateSummary();fillMonthSelects();
    _setSyncStatus('✅ Synchronizováno','#2ecc71');
    return;
  }
  if(_platbySaving) return;
  if(fb&&Object.keys(fb).length>0){
    const localStr=JSON.stringify(_getAllLocal());
    const fbStr=JSON.stringify(fb);
    if(fbStr!==localStr){
      _applyAll(fb);
      items=loadMonth(currentMonth);
      renderCards();updateSummary();
      _setSyncStatus('🔄 Aktualizuji...','#2ecc71');
    }
  }
},(err)=>{console.error(err);_setSyncStatus('❌ Offline','#e74c3c');});

// ── VERZE ──
const VER_KEY='platby_ver';
function loadVer(){try{return parseInt(localStorage.getItem(VER_KEY)||'0',10)||0;}catch(e){return 0;}}
function bumpVer(){const v=loadVer()+1;localStorage.setItem(VER_KEY,v);document.getElementById('ver-badge').textContent='ver.1.'+v;}
function initVer(){document.getElementById('ver-badge').textContent='ver.1.'+loadVer();}

let _toastTimer=null;
function showToast(){const t=document.getElementById('save-toast');t.classList.add('show');clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>t.classList.remove('show'),1600);}
function fmt(n){return n.toLocaleString('cs-CZ')+' Kč';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderMonthBar(){
  const bar=document.getElementById('month-bar');bar.innerHTML='';
  MONTHS.forEach((name,i)=>{const b=document.createElement('button');b.className='month-btn'+(i===currentMonth?' active':'');b.textContent=name;b.onclick=()=>switchMonth(i);bar.appendChild(b);});
  document.getElementById('month-label').textContent=MONTHS[currentMonth]+' 2026';
}
function renderCards(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  if(!items.length){grid.innerHTML='<div class="empty-msg">// žádné platby — přidej první položku níže</div>';return;}
  items.forEach((it,idx)=>{
    const card=document.createElement('div');
    card.className='card '+(it.paid?'paid':'unpaid');
    card.style.animationDelay=(idx*.03)+'s';
    card.innerHTML=\`<div class="card-top"><span class="card-num">\${String(idx+1).padStart(2,'0')}.</span><span class="card-name">\${esc(it.name)}</span><span class="card-amount" title="Klikni pro změnu částky" style="cursor:pointer;">\${it.amount.toLocaleString('cs-CZ')} Kč ✎</span><button class="delete-btn" title="Smazat">✕</button></div>\${it.note?\`<div class="card-note">\${esc(it.note)}</div>\`:'<div class="card-note"></div>'}<div class="card-bottom"><div class="status-dot"></div><button class="toggle-btn \${it.paid?'paid-btn':'unpaid-btn'}">\${it.paid?'✓ Zaplaceno':'✗ Nezaplaceno'}</button></div>\`;
    card.querySelector('.card-amount').onclick=function(){
      if(this.querySelector('.amount-edit-wrap'))return;
      const cur=items[idx].amount;
      this.innerHTML=\`<span class="amount-edit-wrap"><input class="amount-inp" type="number" value="\${cur}" min="0"/><button class="amount-ok">✓ OK</button></span>\`;
      const inp=this.querySelector('.amount-inp');inp.focus();inp.select();
      const save=()=>{const num=parseInt(inp.value,10);if(!isNaN(num)&&num>=0){items[idx].amount=num;saveMonth(currentMonth,items);}renderCards();updateSummary();};
      this.querySelector('.amount-ok').onclick=e=>{e.stopPropagation();save();};
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')save();if(e.key==='Escape')renderCards();});
      inp.addEventListener('click',e=>e.stopPropagation());
    };
    card.querySelector('.toggle-btn').onclick=()=>{items[idx].paid=!items[idx].paid;saveMonth(currentMonth,items);renderCards();updateSummary();};
    card.querySelector('.delete-btn').onclick=()=>{
      const note=card.querySelector('.card-note');
      note.innerHTML=\`Smazat? &nbsp;<button class="ei-btn" style="font-size:.55rem;padding:3px 8px;border-color:rgba(255,68,102,.4);color:var(--warn);" id="cfdel-\${idx}">ANO</button> &nbsp;<button class="ei-btn" style="font-size:.55rem;padding:3px 8px;border-color:rgba(255,255,255,.12);color:var(--muted);" id="cndel-\${idx}">NE</button>\`;
      document.getElementById('cfdel-'+idx).onclick=()=>{items.splice(idx,1);saveMonth(currentMonth,items);renderCards();updateSummary();};
      document.getElementById('cndel-'+idx).onclick=()=>renderCards();
    };
    grid.appendChild(card);
  });
}
function updateSummary(){
  let ps=0,us=0,pc=0,uc=0;
  items.forEach(it=>{it.paid?(ps+=it.amount,pc++):(us+=it.amount,uc++);});
  const tot=ps+us,pct=tot?Math.round(ps/tot*100):0;
  document.getElementById('count-paid').textContent=pc;
  document.getElementById('count-unpaid').textContent=uc;
  document.getElementById('sum-paid').textContent=fmt(ps);
  document.getElementById('sum-unpaid').textContent=fmt(us);
  document.getElementById('total').textContent=fmt(ps);
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('progress-label').textContent=pct+' % uhrazeno';
}
function switchMonth(m){currentMonth=m;items=loadMonth(m);renderMonthBar();renderCards();updateSummary();document.getElementById('add-form').classList.remove('open');}
document.getElementById('add-toggle').onclick=()=>document.getElementById('add-form').classList.toggle('open');
document.getElementById('add-submit').onclick=()=>{
  const name=document.getElementById('inp-name').value.trim();
  const amount=parseInt(document.getElementById('inp-amount').value,10);
  const note=document.getElementById('inp-note').value.trim();
  if(!name){alert('Zadej název platby.');return;}
  if(!amount||amount<0){alert('Zadej platnou částku.');return;}
  items.push({id:Date.now(),name,amount,note,paid:false});
  saveMonth(currentMonth,items);renderCards();updateSummary();
  document.getElementById('inp-name').value='';
  document.getElementById('inp-amount').value='';
  document.getElementById('inp-note').value='';
  document.getElementById('add-form').classList.remove('open');
};
document.getElementById('inp-note').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-submit').click();});
document.getElementById('btn-export').onclick=()=>{
  const all={};MONTHS.forEach((_,i)=>{const r=localStorage.getItem(sKey(i));if(r)all[i]=JSON.parse(r);});
  const ta=document.getElementById('ta-export');ta.value=JSON.stringify(all);ta.classList.add('show');
  document.getElementById('row-copy').style.display='block';document.getElementById('copy-msg').textContent='';
};
document.getElementById('btn-copy').onclick=()=>{
  const ta=document.getElementById('ta-export');ta.select();ta.setSelectionRange(0,99999);
  const msg=document.getElementById('copy-msg');
  try{navigator.clipboard.writeText(ta.value).then(()=>{msg.textContent='✓ Zkopírováno do schránky!';});}catch(e){document.execCommand('copy');msg.textContent='✓ Zkopírováno!';}
};
document.getElementById('btn-import-show').onclick=()=>{
  const ta=document.getElementById('ta-import');ta.classList.toggle('show');
  document.getElementById('row-import-go').style.display=ta.classList.contains('show')?'block':'none';
};
document.getElementById('btn-import-go').onclick=()=>{
  const msg=document.getElementById('import-msg');
  try{
    const all=JSON.parse(document.getElementById('ta-import').value.trim());
    let count=0;
    Object.keys(all).forEach(k=>{const m=parseInt(k);if(m>=0&&m<=11&&Array.isArray(all[m])){localStorage.setItem(sKey(m),JSON.stringify(all[m]));count++;}});
    _platbyRef.set(_getAllLocal()).catch(e=>console.error(e));
    msg.className='ei-msg ok';msg.textContent='✓ Importováno '+count+' měsíců!';
    items=loadMonth(currentMonth);renderCards();updateSummary();
  }catch(e){msg.className='ei-msg err';msg.textContent='✗ Chybný formát dat.';}
};
function fillMonthSelects(){
  ['copy-from','copy-to','del-month'].forEach(id=>{
    const sel=document.getElementById(id);sel.innerHTML='';
    MONTHS.forEach((name,i)=>{const o=document.createElement('option');o.value=i;o.textContent=name;if(id==='copy-from'&&i===currentMonth)o.selected=true;if(id==='copy-to'&&i===(currentMonth+1)%12)o.selected=true;if(id==='del-month'&&i===currentMonth)o.selected=true;sel.appendChild(o);});
  });
}
document.getElementById('btn-del-month').onclick=()=>{
  const m=parseInt(document.getElementById('del-month').value);
  const msg=document.getElementById('del-month-msg');
  msg.className='ei-msg err';
  msg.innerHTML='Opravdu smazat <b>'+MONTHS[m]+'</b>? &nbsp;<button class="ei-btn" id="confirm-del" style="font-size:.58rem;padding:5px 10px;border-color:rgba(255,68,102,.4);color:var(--warn);">ANO, smazat</button> &nbsp;<button class="ei-btn" id="cancel-del" style="font-size:.58rem;padding:5px 10px;border-color:rgba(255,255,255,.15);color:var(--muted);">Zrušit</button>';
  document.getElementById('confirm-del').onclick=()=>{localStorage.setItem(sKey(m),JSON.stringify([]));_platbyRef.set(_getAllLocal()).catch(e=>console.error(e));msg.className='ei-msg ok';msg.textContent='✓ Měsíc '+MONTHS[m]+' byl smazán.';if(m===currentMonth){items=[];renderCards();updateSummary();}};
  document.getElementById('cancel-del').onclick=()=>{msg.textContent='';};
};
document.getElementById('btn-copy-month').onclick=()=>{
  const from=parseInt(document.getElementById('copy-from').value);
  const to=parseInt(document.getElementById('copy-to').value);
  const msg=document.getElementById('copy-month-msg');
  if(from===to){msg.className='ei-msg err';msg.textContent='✗ Zdrojový a cílový měsíc jsou stejné.';return;}
  const src=loadMonth(from);
  if(!src.length){msg.className='ei-msg err';msg.textContent='✗ Zdrojový měsíc je prázdný.';return;}
  const existing=loadMonth(to);
  if(existing.length>0){if(!confirm('Měsíc '+MONTHS[to]+' již má '+existing.length+' položek. Přepsat?'))return;}
  const copy=src.map(it=>({...it,id:Date.now()+Math.random(),paid:false,note:''}));
  saveMonth(to,copy);
  msg.className='ei-msg ok';msg.textContent='✓ Zkopírováno '+copy.length+' položek z '+MONTHS[from]+' do '+MONTHS[to]+'!';
  if(to===currentMonth){items=loadMonth(currentMonth);renderCards();updateSummary();}
};
initVer();fillMonthSelects();
} // konec _initData
<\/script>
</body>
</html>
`;

function _makeBlobUrl(html) {
  var blob = new Blob([html], { type: 'text/html; charset=utf-8' });
  return URL.createObjectURL(blob);
}

function openApp(id) {
  try {
    document.getElementById("welcome").classList.add("hidden");
    document.querySelectorAll(".app-frame").forEach(function(f){ f.classList.remove("visible"); });
    document.querySelectorAll(".app-btn").forEach(function(b){ b.classList.remove("active"); });
    var btn = document.getElementById("btn-" + id);
    if (btn) btn.classList.add("active");
    var frame = document.getElementById("frame-" + id);
    if (frame) {
      if (!loaded[id]) {
        var html = APP_HTML[id];
        // srcdoc je spolehlivější při načítání z content:// na Androidu
        try {
          frame.srcdoc = html;
        } catch(e) {
          // Fallback: Blob URL
          try {
            if (frame._blobUrl) URL.revokeObjectURL(frame._blobUrl);
            frame._blobUrl = _makeBlobUrl(html);
            frame.src = frame._blobUrl;
          } catch(e2) {
            console.error('Chyba při načítání aplikace:', e2);
            alert('Chyba: Aplikace se nepodařilo načíst');
            return;
          }
        }
        loaded[id] = true;
      }
      frame.classList.add("visible");
    }
    try { localStorage.setItem("kladyx-panel-last", id); } catch(e) {
      console.warn('localStorage nedostupný:', e);
    }
  } catch(err) {
    console.error("Kritická chyba:", err);
    alert("Chyba: " + (err.message || err));
  }
}
function goHome() {
  try {
    document.getElementById("welcome").classList.remove("hidden");
    document.querySelectorAll(".app-frame").forEach(function(f){ f.classList.remove("visible"); });
    document.querySelectorAll(".app-btn").forEach(function(b){ b.classList.remove("active"); });
    var homeBtn = document.getElementById("btn-home");
    if (homeBtn) homeBtn.classList.add("active");
    try { localStorage.setItem("kladyx-panel-last", "home"); } catch(e) {}
  } catch(err) {
    alert("Chyba: " + err.message);
  }
}
try {
  var last = localStorage.getItem("kladyx-panel-last");
  if (last && APP_HTML[last]) openApp(last);
} catch(e) {
  console.warn("LocalStorage unavailable:", e);
}

// Fallback: Pokud se něco stane, alespoň se stránka nezbourá
window.addEventListener('error', function(event) {
  console.error('Chyba v aplikaci:', event.error);
});

window.addEventListener('unhandledrejection', function(event) {
  console.error('Unhandled promise rejection:', event.reason);
});
</script>
</body>
</html>
