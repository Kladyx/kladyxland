<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLADYX – OFF AIR</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100vh;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 32px 60px;
      border: 2px solid #ff2244;
      box-shadow: 0 0 40px rgba(255,34,68,0.3), inset 0 0 60px rgba(255,34,68,0.04);
      color: #ff2244;
      font-size: clamp(52px, 12vw, 96px);
      letter-spacing: 0.08em;
      position: relative;
    }
    .badge::before { content: ''; position: absolute; top: -2px; left: -2px; width: 12px; height: 12px; border-top: 2px solid #ffffff33; border-left: 2px solid #ffffff33; }
    .badge::after  { content: ''; position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; border-bottom: 2px solid #ffffff33; border-right: 2px solid #ffffff33; }
    .dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #ff2244;
      box-shadow: 0 0 0 4px rgba(255,34,68,0.2);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="badge">
    <div class="dot"></div>
    OFF AIR
  </div>
</body>
</html>
