<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KLADYXLAND Monitor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0e27;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      padding: 20px;
      min-height: 100vh;
    }

    .monitor-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .header {
      text-align: center;
      border-bottom: 2px solid #00d4ff;
      padding-bottom: 20px;
    }

    .header h1 {
      font-size: 32px;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    /* VU Meter Section */
    .status-section {
      background: linear-gradient(135deg, rgba(10, 14, 39, 0.9), rgba(20, 25, 50, 0.9));
      border: 2px solid #00d4ff;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.05);
    }

    .status-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .info-block {
      text-align: center;
    }

    .info-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .info-value {
      font-size: 24px;
      color: #00d4ff;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    .status-badge {
      display: inline-block;
      padding: 8px 20px;
      border: 2px solid #00d4ff;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .status-on {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
      animation: pulse 1.5s infinite;
    }

    .status-off {
      background: rgba(255, 0, 0, 0.1);
      color: #ff4444;
      border-color: #ff4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }
      50% { opacity: 0.6; text-shadow: 0 0 5px rgba(0, 212, 255, 0.2); }
    }

    /* VU Meter Visual */
    .vu-container {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid rgba(0, 212, 255, 0.3);
    }

    .vu-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .vu-bar {
      height: 40px;
      background: linear-gradient(90deg, 
        rgba(0, 212, 255, 0.1) 0%,
        rgba(0, 100, 200, 0.2) 50%,
        rgba(255, 100, 0, 0.2) 85%,
        rgba(255, 0, 0, 0.2) 100%
      );
      border: 1px solid rgba(0, 212, 255, 0.5);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      margin-bottom: 10px;
    }

    .vu-fill {
      height: 100%;
      background: linear-gradient(90deg,
        #00d4ff 0%,
        #0088ff 50%,
        #ff6400 85%,
        #ff0000 100%
      );
      width: 0%;
      transition: width 0.1s linear;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
    }

    .frequency-analyzer {
      display: flex;
      gap: 3px;
      margin-top: 20px;
      align-items: flex-end;
      height: 60px;
      padding: 10px;
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 4px;
    }

    .freq-bar {
      flex: 1;
      background: linear-gradient(180deg, #00d4ff, #0088ff);
      border-radius: 2px;
      min-height: 5px;
      transition: height 0.05s linear;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
    }

    /* Mixcloud Section */
    .mixcloud-section {
      background: linear-gradient(135deg, rgba(10, 14, 39, 0.9), rgba(20, 25, 50, 0.9));
      border: 2px solid #00d4ff;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.05);
    }

    .section-title {
      font-size: 16px;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.3);
      font-weight: bold;
    }

    .mixcloud-player {
      width: 100%;
      border-radius: 4px;
      overflow: hidden;
    }

    /* Info text */
    .info-text {
      font-size: 12px;
      color: #888;
      margin-top: 20px;
      text-align: center;
      line-height: 1.6;
    }

    .error {
      color: #ff4444;
      padding: 15px;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid #ff4444;
      border-radius: 4px;
      margin-top: 15px;
    }

    @media (max-width: 768px) {
      .status-info {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 20px;
      }

      .monitor-container {
        gap: 20px;
      }

      .status-section,
      .mixcloud-section {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

<div class="monitor-container">
  <div class="header">
    <h1>🎧 KLADYXLAND Monitor</h1>
  </div>

  <div class="status-section">
    <div class="status-info">
      <div class="info-block">
        <div class="info-label">Stav vysílání</div>
        <div class="status-badge" id="onairStatus">
          ◼ OFF AIR
        </div>
      </div>
      <div class="info-block">
        <div class="info-label">Počet posluchačů</div>
        <div class="info-value" id="visitorsCount">0</div>
      </div>
    </div>

    <div class="vu-container">
      <div class="vu-label">Audio Level (VU Meter)</div>
      <div class="vu-bar">
        <div class="vu-fill" id="vuFill"></div>
      </div>
      <div class="vu-label" style="margin-top: 20px;">Frequency Analyzer</div>
      <div class="frequency-analyzer" id="frequencyAnalyzer">
        <div class="freq-bar"></div>
        <div class="freq-bar"></div>
        <div class="freq-bar"></div>
        <div class="freq-bar"></div>
        <div class="freq-bar"></div>
        <div class="freq-bar"></div>
        <div class="freq-bar"></div>
        <div class="freq-bar"></div>
      </div>
    </div>

    <div class="info-text">
      Živá data z Firebase • Aktualizace každých 500ms
    </div>
  </div>

  <div class="mixcloud-section">
    <div class="section-title">Mixcloud Player</div>
    <iframe class="mixcloud-player" 
            src="https://www.mixcloud.com/widget/iframe/?hide_cover=false&light=false&feed=%2Fkladyx%2F" 
            frameborder="0" 
            allowtransparency="true" 
            height="400">
    </iframe>
    <div id="firebaseError"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>

<script>
  // Firebase Configuration (z KLADYXLAND)
  const firebaseConfig = {
    apiKey: "AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",
    authDomain: "kladyxland.firebaseapp.com",
    databaseURL: "https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kladyxland",
    storageBucket: "kladyxland.firebasestorage.app",
    messagingSenderId: "178078059030",
    appId: "1:178078059030:web:8d8a0271b23a7aca2b4337"
  };

  // Initialize Firebase
  try {
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database(app);

    // ON AIR Status
    database.ref('onair').on('value', (snapshot) => {
      const isOnAir = snapshot.val();
      const badge = document.getElementById('onairStatus');
      if (isOnAir) {
        badge.textContent = '◼ ON AIR';
        badge.classList.remove('status-off');
        badge.classList.add('status-on');
      } else {
        badge.textContent = '◼ OFF AIR';
        badge.classList.remove('status-on');
        badge.classList.add('status-off');
      }
    });

    // Visitors Counter
    database.ref('visitors').on('value', (snapshot) => {
      const visitors = snapshot.val() || 0;
      document.getElementById('visitorsCount').textContent = visitors;
    });

    // VU Meter Simulation (randomní animace)
    setInterval(() => {
      const randomVU = Math.random() * 100;
      document.getElementById('vuFill').style.width = randomVU + '%';
      
      // Frequency analyzer animation
      const bars = document.querySelectorAll('.freq-bar');
      bars.forEach(bar => {
        const height = Math.random() * 100;
        bar.style.height = height + '%';
      });
    }, 100);

  } catch (error) {
    document.getElementById('firebaseError').innerHTML = 
      '<div class="error">⚠ Chyba připojení k Firebase: ' + error.message + '</div>';
  }
</script>

</body>
</html>
