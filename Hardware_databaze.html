<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KladyxLand Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050d1a;
    --surface: #081422;
    --card: #0c1d30;
    --groove: #112440;
    --accent: #3a8fff;
    --accent2: #0f4fa8;
    --glow: rgba(58,143,255,0.18);
    --text: #ddeeff;
    --muted: #4a6d90;
    --border: #1a3558;
    --green: #2ecc71;
    --orange: #f39c12;
    --red: #e74c3c;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* animated bg grid */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(58,143,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(58,143,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events:none;
    z-index:0;
  }

  header {
    background: var(--surface);
    padding: 18px 20px 0;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .logo-wrap { display:flex; align-items:center; gap:10px; }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent2);
    border: 1px solid var(--accent);
    border-radius: 8px;
    display: flex; align-items:center; justify-content:center;
    font-size: 18px;
    box-shadow: 0 0 12px var(--glow);
  }

  .app-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-shadow: 0 0 16px rgba(58,143,255,0.4);
    line-height:1;
  }

  .app-subtitle {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .count-badge {
    background: var(--accent2);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.06em;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display:none; }

  .tab {
    flex-shrink: 0;
    padding: 10px 14px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .search-bar {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .search-input {
    width:100%;
    background: var(--groove);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--glow); }

  main { padding: 16px 20px; padding-bottom: 100px; position:relative; z-index:1; }

  /* ITEM CARD */
  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: center;
    transition: all 0.2s;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(10px);
  }
  @keyframes slideIn { to { opacity:1; transform:translateY(0); } }
  .item-card:active { transform: scale(0.98); background: var(--groove); }

  .item-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    border: 1px solid var(--border);
  }

  .item-info { flex:1; min-width:0; }

  .item-category {
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .item-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }

  .item-brand {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .item-meta {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink:0;
  }
  .status-ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-repair { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
  .status-off { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .status-label {
    font-size: 10px;
    color: var(--muted);
  }

  .tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--groove);
    color: var(--muted);
    letter-spacing: 0.06em;
    border: 1px solid var(--border);
  }

  .item-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items:center; justify-content:center;
    transition: all 0.15s;
  }
  .btn-icon:active { transform: scale(0.9); }
  .btn-icon.delete:active { background: var(--red); border-color: var(--red); color: #fff; }
  .btn-icon.edit:active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-icon.fav.on { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--glow); }

  /* EMPTY */
  .empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-icon { font-size:56px; margin-bottom:16px; opacity:0.3; }
  .empty h3 { font-family:'Orbitron',sans-serif; font-size:16px; color:var(--text); margin-bottom:8px; }
  .empty p { font-size:12px; line-height:1.6; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 50%;
    transform: translateX(50%);
    background: var(--accent);
    color: #050d1a;
    border: none;
    border-radius: 28px;
    padding: 14px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow: 0 4px 28px rgba(58,143,255,0.4);
    display: flex; align-items:center; gap:8px;
    transition: all 0.2s;
    z-index: 200;
  }
  .fab:active { transform: translateX(50%) scale(0.96); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0;
    background: rgba(0,0,0,0.8);
    z-index:300;
    display:flex; align-items:flex-end;
    opacity:0; pointer-events:none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width:100%; max-width:430px; margin:0 auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    border-top: 1px solid var(--border);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width:36px; height:4px;
    background: var(--border);
    border-radius:2px;
    margin: 0 auto 20px;
  }

  .modal h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 20px;
    text-shadow: 0 0 12px var(--glow);
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display:block;
    font-size:10px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--muted);
    margin-bottom:6px;
  }

  .form-input, .form-select, .form-textarea {
    width:100%;
    background: var(--groove);
    border: 1px solid var(--border);
    border-radius:8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size:13px;
    outline:none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance:none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color:var(--accent);
    box-shadow: 0 0 0 2px var(--glow);
  }
  .form-textarea { resize:none; height:70px; }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .status-picker { display:flex; gap:8px; }

  .status-opt {
    flex:1; padding:10px 6px;
    border-radius:8px;
    border:1px solid var(--border);
    background: var(--groove);
    color: var(--muted);
    font-family:'DM Mono',monospace;
    font-size:11px; letter-spacing:0.06em;
    cursor:pointer; text-align:center;
    transition:all 0.15s;
  }
  .status-opt.active-ok { border-color:var(--green); color:var(--green); background:rgba(46,204,113,0.1); }
  .status-opt.active-repair { border-color:var(--orange); color:var(--orange); background:rgba(243,156,18,0.1); }
  .status-opt.active-off { border-color:var(--red); color:var(--red); background:rgba(231,76,60,0.1); }

  .btn-submit {
    width:100%;
    background: var(--accent);
    color: #050d1a;
    border:none; border-radius:10px;
    padding:14px;
    font-family:'DM Mono',monospace; font-size:14px; letter-spacing:0.06em;
    cursor:pointer; margin-top:8px;
    transition: opacity 0.2s;
    font-weight:700;
  }
  .btn-submit:active { opacity:0.85; }

  /* STATS */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }

  .stat-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:16px;
    animation: slideIn 0.3s ease forwards; opacity:0; transform:translateY(10px);
  }

  .stat-value {
    font-family:'Orbitron',sans-serif; font-size:22px; font-weight:900;
    color:var(--accent); margin-bottom:6px; text-shadow:0 0 12px var(--glow);
  }

  .stat-label { font-size:10px; color:var(--muted); letter-spacing:0.08em; }

  .section-label {
    font-size:10px; letter-spacing:0.15em; text-transform:uppercase;
    color:var(--muted); margin:24px 0 12px; font-weight:400;
  }

  .status-summary { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }

  .ss-card {
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:12px 8px; text-align:center;
    animation: slideIn 0.3s ease forwards; opacity:0; transform:translateY(10px);
  }

  .ss-val { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; margin-bottom:4px; }
  .ss-lbl { font-size:9px; color:var(--muted); letter-spacing:0.06em; }

  .cat-list { display:flex; flex-direction:column; gap:10px; }

  .cat-row {
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:10px 12px;
    animation: slideIn 0.3s ease forwards; opacity:0; transform:translateY(10px);
    font-size:13px;
  }

  .cat-bar-wrap { flex:1; height:8px; background:var(--groove); border-radius:4px; overflow:hidden; }
  .cat-bar { height:100%; border-radius:4px; transition:width 0.4s ease; }

  /* SYNC BUTTONS */
  .sync-bar {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 12px;
  }
  .sync-btn {
    flex: 1;
    padding: 8px 10px;
    background: var(--groove);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sync-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #importFileInput { display: none; }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* LIGHTBOX */
  #hw-lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);justify-content:center;align-items:center;}
  #hw-lightbox.open{display:flex;}
  #hw-lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:6px;box-shadow:0 0 40px rgba(0,245,255,.1);}
  #hw-lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:2rem;cursor:pointer;opacity:.7;}
  #hw-lightbox-close:hover{opacity:1;}

  /* DRAG & DROP */
  .item-card[draggable] { cursor: grab; }
  .item-card.dragging { opacity: .35; transform: scale(.97); }
  .item-card.drag-over { border-color: var(--accent) !important; box-shadow: 0 0 12px rgba(0,245,255,.3); }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-wrap">
      <div class="logo-icon">🎛️</div>
      <div>
        <div class="app-title">KLADYXLAND</div>
        <div class="app-subtitle">Studio Manager <span style="font-size:.55rem;color:rgba(255,255,255,.2);font-family:monospace;margin-left:6px;">ver.1.7HW</span></div>
      </div>
    </div>
    <div class="count-badge" id="countBadge">0 položek</div>
  </div>
  <div class="sync-bar">
    <button class="sync-btn" onclick="exportJSON()">⬇ Export</button>
    <span id="sync-dot" style="font-size:.75rem;color:#4a6d90;letter-spacing:.05em;margin-left:auto;align-self:center;">⏳ Načítám...</span>
    <button class="sync-btn" style="border-color:var(--accent);color:var(--accent);" onclick="hwSaveOrder()">💾 Sestava</button>
    <button class="sync-btn" onclick="document.getElementById('importFileInput').click()">⬆ Import</button>
    <input type="file" id="importFileInput" accept=".json" onchange="importJSON(event)">
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('vse', this)">Vše</button>
    <button class="tab" onclick="switchTab('oblibene', this)">★ Oblíbené</button>
    <button class="tab" onclick="switchTab('hardware', this)">Hardware</button>
    <button class="tab" onclick="switchTab('software', this)">Software</button>
    <button class="tab" onclick="switchTab('prislusenstvi', this)">Příslušenství</button>
    <button class="tab" onclick="switchTab('statistiky', this)">Statistiky</button>
    <button class="tab" onclick="switchTab('seznam', this)">Seznam</button>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <input class="search-input" id="searchInput" oninput="render()" placeholder="Hledat vybavení..." type="text">
</div>

<main id="mainContent"></main>

<button class="fab" onclick="openModal()"><span style="font-size:16px">+</span> Přidat položku</button>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nová položka</h2>

    <div class="form-group">
      <label class="form-label">Kategorie</label>
      <select class="form-select" id="fCat" onchange="updateCatIcon()">
        <option value="Hardware">🎛️ Hardware</option>
        <option value="Software">💿 Software</option>
        <option value="Příslušenství">🎧 Příslušenství</option>
        <option value="Světla">💡 Světla / AV</option>
        <option value="Kabely">🔌 Kabely</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Název</label>
      <input class="form-input" id="fName" placeholder="např. Pioneer CDJ-3000" type="text">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Výrobce / Brand</label>
        <input class="form-input" id="fBrand" placeholder="Pioneer DJ" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Sériové číslo</label>
        <input class="form-input" id="fSerial" placeholder="nepovinné" type="text">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Rok / Verze</label>
        <input class="form-input" id="fYear" placeholder="2022" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Cena (Kč)</label>
        <input class="form-input" id="fPrice" placeholder="nepovinné" type="number">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Stav</label>
      <div class="status-picker">
        <div class="status-opt active-ok" id="sOk" onclick="setStatus('ok')">✓ Funkční</div>
        <div class="status-opt" id="sRepair" onclick="setStatus('repair')">⚠ V opravě</div>
        <div class="status-opt" id="sOff" onclick="setStatus('off')">✕ Vyřazeno</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Poznámky</label>
      <textarea class="form-textarea" id="fNotes" placeholder="Umístění, stav, licence…"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Fotka (volitelné)</label>
      <div id="hwDropZone" onclick="document.getElementById('fPhoto').click()" ondragover="event.preventDefault();this.style.borderColor='#00f5ff'" ondragleave="this.style.borderColor='rgba(0,245,255,.25)'" ondrop="hwHandleDrop(event)" style="border:2px dashed rgba(0,245,255,.25);border-radius:8px;padding:16px;text-align:center;cursor:pointer;color:rgba(0,245,255,.5);font-size:.8rem;transition:border-color .2s;">
        📁 Klikni nebo přetáhni fotku sem
      </div>
      <input class="form-input" id="fPhoto" type="file" accept="image/*" onchange="previewPhoto()" style="display:none;">
      <div id="photoPreview" style="margin-top:8px;max-width:100%;border-radius:6px;overflow:hidden;"></div>
      <button type="button" id="hwPhotoClearBtn" onclick="hwClearPhoto()" style="display:none;margin-top:6px;background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4);color:#e74c3c;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.78rem;">✕ Smazat fotku</button>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="saveItem()">Přidat do inventáře</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── FIREBASE SYNC ─────────────────────────────────────────────
  const _fbConfig = {
    apiKey: "AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",
    authDomain: "kladyxland.firebaseapp.com",
    databaseURL: "https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kladyxland",
    storageBucket: "kladyxland.firebasestorage.app",
    messagingSenderId: "178078059030",
    appId: "1:178078059030:web:8d8a0271b23a7aca2b4337"
  };
  if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
  const _db = firebase.database();
  const _storage = firebase.storage();
  const _hwRef = _db.ref('hardwareDb');

  function _setSyncStatus(msg, color) {
    const el = document.getElementById('sync-dot');
    if (el) { el.textContent = msg; el.style.color = color || '#4a6d90'; }
  }
  // ──────────────────────────────────────────────────────────────

  const CAT_ICONS = {
    'Hardware':'🎛️','Software':'💿','Příslušenství':'🎧','Světla':'💡','Kabely':'🔌'
  };
  const CAT_COLORS = {
    'Hardware':'#3a8fff','Software':'#a855f7','Příslušenství':'#2ecc71',
    'Světla':'#f39c12','Kabely':'#e74c3c'
  };

  let items = JSON.parse(localStorage.getItem('kladyx_items') || '[]');

  let currentStatus = 'ok';

  let _hwSaving = false;

  function hwSaveOrder() {
    save();

  function save() {
    _hwSaving = true;
    setTimeout(() => { _hwSaving = false; }, 3000);
    // Přidat order index každé položce
    items.forEach((it, i) => { it.order = i; });
    localStorage.setItem('kladyx_items', JSON.stringify(items));
    updateBadge();
    // Uložit do Firebase – konvertuj array na objekt keyed by id
    const obj = {};
    items.forEach(it => { obj['id_' + it.id] = it; });
    _setSyncStatus('⏳ Ukládám...', '#f39c12');
    _hwRef.set(obj)
      .then(() => _setSyncStatus('✅ Synchronizováno', '#2ecc71'))
      .catch(e => { console.error('Firebase save error:', e); _setSyncStatus('❌ Chyba sync', '#e74c3c'); });
  }

  function updateBadge() {
    const n = items.length;
    document.getElementById('countBadge').textContent = n + (n===1?' položka':n<5?' položky':' položek');
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('searchBar').style.display = (tab==='statistiky'||tab==='seznam') ? 'none' : 'block';
    render();
  }

  function render() {
    if (currentTab === 'statistiky') renderStats();
    else if (currentTab === 'seznam') renderSeznam();
    else renderList();
  }

  function renderList() {
    const q = (document.getElementById('searchInput')?.value||'').toLowerCase();

      const match = it.name.toLowerCase().includes(q) || it.brand.toLowerCase().includes(q);
      if (currentTab === 'oblibene') return match && it.fav;
      if (currentTab === 'hardware') return match && it.cat === 'Hardware';
      if (currentTab === 'software') return match && it.cat === 'Software';
      if (currentTab === 'prislusenstvi') return match && (it.cat==='Příslušenství'||it.cat==='Kabely'||it.cat==='Světla');
      return match;
    });

    const main = document.getElementById('mainContent');

      const color = CAT_COLORS[it.cat]||'#3a8fff';

          ${it.photo ? `<img src="${it.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;cursor:pointer;" onclick="hwOpenLightbox('${it.photo}')">` : CAT_ICONS[it.cat]||'🎵'}

        <div class="item-info">
          <div class="item-category">${it.cat}</div>
          <div class="item-name">${it.name}</div>
          <div class="item-brand">${it.brand}${it.year?' · '+it.year:''}</div>
          <div class="item-meta">
            <span class="status-dot ${dotClass}"></span>
            <span class="status-label">${statusText}</span>

            ${it.price?`<span class="tag">${Number(it.price).toLocaleString('cs')} Kč</span>`:''}
            ${it.photo?`<span class="tag">📷</span>`:''}

          ${it.notes?`<div style="font-size:11px;color:var(--muted);margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.notes}</div>`:''}

    const totalVal = items.reduce((s,i)=>s+(+i.price||0),0);
    const cats = {};

        <div class="ss-card" style="animation-delay:0.16s"><div class="ss-val" style="color:var(--red)">${off}</div><div class="ss-lbl">Vyřazeno</div></div>

  function openModal() {

    document.getElementById('submitBtn').textContent = 'Přidat do inventáře';
    document.getElementById('modalOverlay').classList.add('open');
    currentStatus = 'ok';

  function editItem(id, e) {
    e.stopPropagation();
    const item = items.find(i => i.id === id);

    editingId = id; // Nastavíme režim editace
    document.getElementById('modalTitle').textContent = 'Upravit položku';
    document.getElementById('submitBtn').textContent = 'Uložit změny';
    
    // Vyplníme formulář daty z položky
    document.getElementById('fCat').value = item.cat;
    document.getElementById('fName').value = item.name;
    document.getElementById('fBrand').value = item.brand === '—' ? '' : item.brand;
    document.getElementById('fSerial').value = item.serial || '';
    document.getElementById('fYear').value = item.year || '';
    document.getElementById('fPrice').value = item.price || '';
    document.getElementById('fNotes').value = item.notes || '';
    currentStatus = item.status || 'ok';
    
    // Načtení fotky
    window.currentPhotoData = (item.photo && item.photo.startsWith('http')) ? item.photo : null;
    const preview = document.getElementById('photoPreview');
    if (item.photo) {
      preview.innerHTML = `<img src="${item.photo}" style="width:100%;height:auto;display:block;">`;
      document.getElementById('hwPhotoClearBtn').style.display = 'block';
    } else {
      preview.innerHTML = '';
    }

    document.getElementById('modalOverlay').classList.add('open');

  function closeModal() { 
    document.getElementById('modalOverlay').classList.remove('open');

  }
  
  function handleOverlayClick(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

  function setStatus(s) { currentStatus=s; updateStatusUI(); }
  
  function updateStatusUI() {
    document.getElementById('sOk').className = 'status-opt'+(currentStatus==='ok'?' active-ok':'');
    document.getElementById('sRepair').className = 'status-opt'+(currentStatus==='repair'?' active-repair':'');
    document.getElementById('sOff').className = 'status-opt'+(currentStatus==='off'?' active-off':'');
  }

  async function saveItem() {
    const name = document.getElementById('fName').value.trim();
    const brand = document.getElementById('fBrand').value.trim();
    
    if (!name) { 
      document.getElementById('fName').style.borderColor='var(--red)'; 
      return; 
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Ukládám...';

    let photoURL = (window.currentPhotoData && window.currentPhotoData.startsWith('http')) ? window.currentPhotoData : null;
    if (window.currentPhotoFile) {
      try {
        const compressed = await compressImage(window.currentPhotoFile);
        const ref = _storage.ref('hardware/' + Date.now() + '_' + compressed.name);
        await ref.put(compressed);
        photoURL = await ref.getDownloadURL();
      } catch(e) { console.error('Upload fotky selhal:', e); }
    }

    const itemData = {
      cat: document.getElementById('fCat').value,
      name,
      brand: brand||'—',
      serial: document.getElementById('fSerial').value.trim(),
      year: document.getElementById('fYear').value.trim(),
      price: document.getElementById('fPrice').value.trim(),
      notes: document.getElementById('fNotes').value.trim(),
      status: currentStatus,
      photo: photoURL
    };

    if (editingId !== null) {
      // Editace existující položky
      const item = items.find(i => i.id === editingId);
      if (item) {
        Object.assign(item, itemData);
      }
    } else {
      // Přidání nové položky
      items.push({
        id: Date.now(),
        ...itemData,
        fav: false
      });
    }

    save();
    btn.disabled = false;
    btn.textContent = editingId !== null ? 'Uložit změny' : 'Přidat do inventáře';
    closeModal();
    if (currentTab==='statistiky') switchTab('vse', document.querySelector('.tab'));
    else render();
  }


  function hwOpenLightbox(url) {
    document.getElementById('hw-lightbox-img').src = url;
    document.getElementById('hw-lightbox').classList.add('open');
  }

  function compressImage(file, maxWidth=1200, quality=0.75) {
    return new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => resolve(new File([blob], file.name, {type:'image/jpeg'})), 'image/jpeg', quality);
      };
      img.src = url;
    });
  }

  function hwClearPhoto() {
    window.currentPhotoFile = null;
    window.currentPhotoData = null;
    document.getElementById('photoPreview').innerHTML = '';
    document.getElementById('fPhoto').value = '';
    document.getElementById('hwPhotoClearBtn').style.display = 'none';
  }

  let hwDragSrcId = null;

  function hwDragStart(e) {
    hwDragSrcId = parseInt(e.currentTarget.dataset.id);
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function hwDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  }

  function hwDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }

  function hwDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    const targetId = parseInt(e.currentTarget.dataset.id);
    if (hwDragSrcId === targetId) return;
    const srcIdx = items.findIndex(i => i.id === hwDragSrcId);
    const tgtIdx = items.findIndex(i => i.id === targetId);
    if (srcIdx === -1 || tgtIdx === -1) return;
    const [moved] = items.splice(srcIdx, 1);
    items.splice(tgtIdx, 0, moved);
    render();
  }

  function hwHandleDrop(e) {
    e.preventDefault();
    document.getElementById('hwDropZone').style.borderColor = 'rgba(0,245,255,.25)';
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    window.currentPhotoFile = file;
    const url = URL.createObjectURL(file);
    document.getElementById('photoPreview').innerHTML = `<img src="${url}" style="width:100%;height:auto;display:block;">`;
    document.getElementById('hwPhotoClearBtn').style.display = 'block';
  }

  function previewPhoto() {
    const fileInput = document.getElementById('fPhoto');
    const preview = document.getElementById('photoPreview');
    const file = fileInput.files[0];
    if (file) {
      window.currentPhotoFile = file;
      const url = URL.createObjectURL(file);
      preview.innerHTML = `<img src="${url}" style="width:100%;height:auto;display:block;">`;
    } else {

      preview.innerHTML = '';
    }
  }

  function exportCSV() {
    const sorted = [...items].sort((a, b) => (a.brand||'').localeCompare(b.brand||'') || a.name.localeCompare(b.name));
    const header = ['#','Znacka','Nazev','Kategorie','Rok','Cena (Kc)','Stav','SN','Poznamka'];
    const rows = sorted.map((it, i) => [
      i+1,
      '"'+(it.brand||'').replace(/"/g,'""')+'"',
      '"'+(it.name||'').replace(/"/g,'""')+'"',
      '"'+(it.cat||'').replace(/"/g,'""')+'"',
      it.year||'',
      it.price||'',
      '"'+(it.status||'').replace(/"/g,'""')+'"',
      it.serial||'',
      '"'+(it.notes||'').replace(/"/g,'""')+'"'
    ]);
    const csv = [header,...rows].map(r=>r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='kladyxland_hardware.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function deleteItem(id, e) {
    e.stopPropagation();
    items = items.filter(i=>i.id!==id);
    save(); render();
  }

  function toggleFav(id, e) {
    e.stopPropagation();
    const it = items.find(i=>i.id===id);
    if (it) { it.fav=!it.fav; save(); render(); }
  }

  // === EXPORT / IMPORT ===
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function exportJSON() {
    if (items.length === 0) { showToast('Žádná data k exportu'); return; }
    const data = JSON.stringify(items, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'hardware_backup.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Export hotový ✓');
  }

  function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error('Neplatný formát');
        const valid = imported.every(r => r.name);
        if (!valid) throw new Error('Chybí povinná pole');

        if (confirm(`Importovat ${imported.length} položek?\nStávající data budou nahrazena.`)) {
          items = imported;
          save();
          render();
          showToast(`Importováno ${imported.length} položek ✓`);
        }
      } catch (err) {
        showToast('Chyba: neplatný soubor');
      }
      event.target.value = '';
    };
    reader.readAsText(file);
  }

    { id:1, cat:'Hardware', name:'Pioneer CDJ-3000', brand:'Pioneer DJ', serial:'CDJ3-00421', year:'2021', price:'65000', notes:'Hlavní přehrávač', status:'ok', fav:true },

    { id:4, cat:'Software', name:'Rekordbox DJ', brand:'Pioneer DJ', serial:'', year:'v6.7', price:'0', notes:'Licence zdarma', status:'ok', fav:false },
    { id:5, cat:'Software', name:'Ableton Live 11', brand:'Ableton', serial:'', year:'2023', price:'18000', notes:'Suite licence', status:'ok', fav:true },
    { id:6, cat:'Příslušenství', name:'HDJ-X10 Sluchátka', brand:'Pioneer DJ', serial:'', year:'2021', price:'8500', notes:'', status:'ok', fav:false },
    { id:7, cat:'Světla', name:'LED Par 64', brand:'Eurolite', serial:'', year:'2019', price:'2200', notes:'2x kusy', status:'repair', fav:false },
  ];

  let _firstHwLoad = true;
  _hwRef.on('value', (snapshot) => {
    const fbData = snapshot.val();
    if (_firstHwLoad) {
      _firstHwLoad = false;
      if (!fbData) {
        // Firebase prázdný – nahraj lokální data nebo demo
        if (items.length === 0) { items = _DEMO_HW; }
        save();
      } else {
        items = Object.values(fbData).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
        localStorage.setItem('kladyx_items', JSON.stringify(items));
      }
      updateBadge();
      render();
      _setSyncStatus('✅ Synchronizováno', '#2ecc71');
      return;
    }
    // Aktualizace z jiného zařízení
    if (_hwSaving) return; // ignoruj vlastní zápis
    if (fbData) {
      const fbItems = Object.values(fbData).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
      if (JSON.stringify(fbItems) !== JSON.stringify(items)) {
        items = fbItems;
        localStorage.setItem('kladyx_items', JSON.stringify(items));
        updateBadge();
        render();
        _setSyncStatus('🔄 Synchronizováno', '#2ecc71');
      }
    }
  }, (error) => {
    console.error('Firebase listener error:', error);
    _setSyncStatus('❌ Offline', '#e74c3c');
    // Fallback na localStorage
    updateBadge();
    render();
  });
  // ──────────────────────────────────────────────────────────────
</script>
