<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLADYXLAND Mixcloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #00d4ff;
      --primary-dark: #0077aa;
      --accent: #ff006e;
      --accent2: #a855f7;
      --bg-dark: #06081a;
      --bg-card: rgba(12, 16, 42, 0.95);
      --text-primary: #e8eaef;
      --text-dim: #6b7294;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    .bg-gradient {
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(0,212,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(255,0,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(168,85,247,0.04) 0%, transparent 60%);
    }

    .bg-grid {
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 20s linear infinite;
    }

    @keyframes gridDrift {
      0%   { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    /* ── Floating particles ── */
    .particles {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0;
      animation: particleFloat linear infinite;
    }
    .particle:nth-child(odd) { background: var(--accent); }
    .particle:nth-child(3n)  { background: var(--accent2); width: 2px; height: 2px; }

    @keyframes particleFloat {
      0%   { opacity: 0; transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }

    /* ── Main container ── */
    .container {
      width: 100%; max-width: 920px;
      position: relative; z-index: 2;
      animation: containerIn 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes containerIn {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card {
      background: var(--bg-card);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 20px;
      padding: 0;
      overflow: hidden;
      box-shadow:
        0 0 80px rgba(0,212,255,0.1),
        0 25px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      position: relative;
    }

    /* Top glow bar */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 5%, var(--primary) 30%, var(--accent) 50%, var(--accent2) 70%, transparent 95%);
      z-index: 10;
    }

    /* ── Header ── */
    .header {
      padding: 45px 40px 30px;
      text-align: center;
      position: relative;
    }

    .logo-ring {
      width: 90px; height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 2px solid rgba(0,212,255,0.4);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      animation: ringPulse 3s ease-in-out infinite;
    }

    .logo-ring::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(0,212,255,0.15);
      animation: ringRotate 8s linear infinite;
      border-top-color: var(--accent);
    }

    .logo-ring::after {
      content: '';
      position: absolute; inset: -12px;
      border-radius: 50%;
      border: 1px dashed rgba(168,85,247,0.2);
      animation: ringRotate 12s linear infinite reverse;
    }

    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0,212,255,0.2); }
      50%      { box-shadow: 0 0 40px rgba(0,212,255,0.4); }
    }

    @keyframes ringRotate { to { transform: rotate(360deg); } }

    .logo-icon {
      font-size: 38px;
      animation: discSpin 4s linear infinite;
    }

    @keyframes discSpin { to { transform: rotate(360deg); } }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--primary) 0%, #60efff 40%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,212,255,0.3));
      line-height: 1.1;
    }

    .subtitle {
      font-family: 'Rajdhani', sans-serif;
      color: var(--text-dim);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-top: 12px;
    }

    /* ── Equalizer bars ── */
    .eq-strip {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 3px;
      height: 50px;
      padding: 0 40px;
      margin-top: 20px;
    }

    .eq-bar {
      width: 4px;
      border-radius: 2px;
      background: linear-gradient(to top, var(--primary), var(--accent));
      animation: eqBounce 1s ease-in-out infinite alternate;
      opacity: 0.6;
    }

    @keyframes eqBounce {
      0%   { height: 6px; }
      100% { height: var(--h); }
    }

    /* ── Player section ── */
    .player-section {
      padding: 25px 35px 35px;
    }

    .player-wrapper {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(0,212,255,0.15);
      background: rgba(0,0,0,0.3);
      position: relative;
      transition: all 0.4s ease;
      box-shadow:
        0 0 30px rgba(0,212,255,0.1),
        inset 0 0 40px rgba(0,0,0,0.3);
    }

    .player-wrapper:hover {
      border-color: rgba(0,212,255,0.35);
      box-shadow:
        0 0 50px rgba(0,212,255,0.2),
        inset 0 0 40px rgba(0,0,0,0.2);
    }

    /* Corner accents */
    .player-wrapper::before,
    .player-wrapper::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--primary);
      border-style: solid;
      z-index: 5;
      opacity: 0.5;
    }
    .player-wrapper::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
      border-radius: 14px 0 0 0;
    }
    .player-wrapper::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 14px 0;
    }

    iframe {
      width: 100%; height: 500px;
      border: none; display: block;
    }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 25px 35px;
      border-top: 1px solid rgba(0,212,255,0.08);
    }

    .stat {
      text-align: center;
      animation: fadeInUp 0.6s ease-out both;
    }
    .stat:nth-child(1) { animation-delay: 0.3s; }
    .stat:nth-child(2) { animation-delay: 0.45s; }
    .stat:nth-child(3) { animation-delay: 0.6s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stat-icon {
      font-size: 20px;
      margin-bottom: 4px;
      display: block;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      color: var(--primary);
      font-weight: 700;
      margin-top: 2px;
    }

    /* ── Footer ── */
    .footer {
      padding: 0 35px 30px;
      text-align: center;
    }

    .footer-line {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
      margin: 0 auto 18px;
    }

    .footer-text {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .footer-text .hl {
      color: var(--primary);
      font-weight: 600;
    }

    .footer-brand {
      margin-top: 14px;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 5px;
      color: rgba(0,212,255,0.25);
      text-transform: uppercase;
    }

    /* ── Side floating icons ── */
    .float-icons {
      position: fixed;
      pointer-events: none;
      z-index: 1;
    }

    .float-icon {
      position: fixed;
      font-size: 22px;
      opacity: 0.08;
      animation: floatDrift 15s ease-in-out infinite;
    }

    @keyframes floatDrift {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      33%      { transform: translateY(-20px) rotate(5deg); }
      66%      { transform: translateY(10px) rotate(-3deg); }
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .header { padding: 35px 25px 20px; }
      h1 { font-size: 34px; letter-spacing: 4px; }
      .subtitle { font-size: 12px; letter-spacing: 4px; }
      .player-section { padding: 20px 20px 25px; }
      iframe { height: 400px; }
      .stats-strip { gap: 25px; padding: 20px 20px; }
      .logo-ring { width: 75px; height: 75px; }
      .logo-icon { font-size: 32px; }
      .float-icon { display: none; }
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      .card { border-radius: 14px; }
      h1 { font-size: 28px; letter-spacing: 3px; }
      .header { padding: 30px 15px 15px; }
      .player-section { padding: 15px 12px 20px; }
      iframe { height: 350px; }
      .stats-strip { gap: 18px; flex-wrap: wrap; }
      .eq-strip { padding: 15px 15px 0; }
    }
    .starfield{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none;z-index:1;}
    .star{position:absolute;width:3px;height:3px;background:#00a0ff;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:starPulse 2s ease-in-out infinite;}
    .star.big{width:8px;height:8px;}
    @keyframes starPulse{0%,100%{opacity:.15;transform:scale(.5);}50%{opacity:1;transform:scale(2.2);box-shadow:0 0 8px #00f5ff,0 0 16px rgba(0,245,255,.5),0 0 24px rgba(0,245,255,.2);}}
  </style>
</head>
<body>

  <!-- Hvězdičky -->
  <div class="starfield" id="starfield"></div>

  <!-- Background layers -->
  <div class="bg-layer bg-gradient"></div>
  <div class="bg-layer bg-grid"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Floating music icons -->
  <span class="float-icon" style="top:12%;left:6%;animation-delay:-2s;">🎵</span>
  <span class="float-icon" style="top:70%;left:4%;animation-delay:-7s;font-size:18px;">🎶</span>
  <span class="float-icon" style="top:25%;right:5%;animation-delay:-4s;">🎧</span>
  <span class="float-icon" style="top:80%;right:7%;animation-delay:-9s;font-size:16px;">🎹</span>
  <span class="float-icon" style="top:50%;left:8%;animation-delay:-12s;font-size:16px;">💿</span>
  <span class="float-icon" style="top:40%;right:4%;animation-delay:-6s;font-size:20px;">🎵</span>

  <div class="container">
    <div class="card">

      <!-- Header -->
      <div class="header">
        <div class="logo-ring">
          <span class="logo-icon">💿</span>
        </div>
        <h1>KLADYXLAND</h1>
        <div class="subtitle">Mixcloud Player</div>
      </div>

      <!-- Equalizer strip -->
      <div class="eq-strip" id="eqStrip"></div>

      <!-- Player -->
      <div class="player-section">
        <div class="player-wrapper">
          <iframe
            src="https://www.mixcloud.com/widget/iframe/?hide_cover=false&light=false&feed=%2Fkladyx%2F"
            frameborder="0"
            allowtransparency="true"
            loading="lazy">
          </iframe>
          <div style="text-align:center;padding:12px;">
            <a id="live-btn" href="https://www.mixcloud.com/live/kladyx/" target="_blank" style="display:inline-block;padding:10px 24px;background:linear-gradient(135deg,#ff006e,#a855f7);border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-decoration:none;text-transform:uppercase;">🔴 SLEDOVAT ŽIVĚ</a>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-strip">
        <div class="stat">
          <span class="stat-icon">🎛️</span>
          <div class="stat-label">Platform</div>
          <div class="stat-value">Mixcloud</div>
        </div>
        <div class="stat">
          <span class="stat-icon">🎚️</span>
          <div class="stat-label">Styl</div>
          <div class="stat-value">Radio</div>
        </div>
        <div class="stat">
          <span class="stat-icon">📡</span>
          <div class="stat-label">Status</div>
          <div class="stat-value">ONLINE</div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="footer-line"></div>
        <div class="footer-text">
          Poslouchej hudbu z <span class="hl">KLADYXLAND</span>
        </div>
        <div class="footer-brand">Powered by Mixcloud</div>
        <div class="footer-brand" style="margin-top:6px;">ver.1.8.3Uc</div>
      </div>

    </div>
  </div>

  <script>
    // Generate particles
    const pc = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (8 + Math.random() * 14) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      pc.appendChild(p);
    }

    // Generate EQ bars
    const eq = document.getElementById('eqStrip');
    for (let i = 0; i < 40; i++) {
      const bar = document.createElement('div');
      bar.className = 'eq-bar';
      const maxH = 8 + Math.random() * 28;
      bar.style.setProperty('--h', maxH + 'px');
      bar.style.animationDuration = (0.4 + Math.random() * 0.8) + 's';
      bar.style.animationDelay = (Math.random() * 1) + 's';
      eq.appendChild(bar);
    }

    // Generate stars
    const sf = document.getElementById('starfield');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = i % 5 === 0 ? 'star big' : 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDuration = (1 + Math.random() * 3) + 's';
      s.style.animationDelay = (Math.random() * 3) + 's';
      sf.appendChild(s);
    }
  </script>

  <style>
    @keyframes liveGlow{0%,100%{box-shadow:0 0 8px rgba(0,255,100,.6);}50%{box-shadow:0 0 22px rgba(0,255,100,.9);}}
    #live-btn.is-live{background:linear-gradient(135deg,#00cc55,#00ff88)!important;color:#003a10!important;animation:liveGlow 1s ease-in-out infinite;}
  </style>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
    const app = initializeApp({
      apiKey: "AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",
      databaseURL: "https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "kladyxland"
    });
    const db = getDatabase(app);
    onValue(ref(db, 'onair/live'), snap => {
      const btn = document.getElementById('live-btn');
      if (snap.val() === true) {
        btn.classList.add('is-live');
        btn.textContent = '🟢 PRÁVĚ VYSÍLÁM';
      } else {
        btn.classList.remove('is-live');
        btn.textContent = '🔴 SLEDOVAT ŽIVĚ';
      }
    });
  </script>
</body>
</html>
