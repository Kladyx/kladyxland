<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KLADYXLAND – LP desky</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090e18;
    --surface: #0d1525;
    --card: #111d30;
    --groove: #172240;
    --accent: #4a9eff;
    --accent2: #1a5fc4;
    --text: #e3ecf5;
    --muted: #5a7a99;
    --border: #1e3050;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    padding: 20px 20px 0;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .app-subtitle {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .count-badge {
    background: var(--accent2);
    color: #fff;
    font-size: 11px;
    font-weight: 400;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-top: 4px;
  }

  .tab {
    flex: 1;
    padding: 10px 0;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* SEARCH */
  .search-bar {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .search-input {
    width: 100%;
    background: var(--groove);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  /* MAIN CONTENT */
  main { padding: 16px 20px; padding-bottom: 100px; }

  /* RECORD CARD */
  .record-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 14px;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(10px);
  }

  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .record-card:active { transform: scale(0.98); background: var(--groove); }

  /* VINYL DISC */
  .vinyl {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .vinyl::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #1a1a1a 0deg 30deg,
      #222 30deg 60deg,
      #1a1a1a 60deg 90deg,
      #222 90deg 120deg,
      #1a1a1a 120deg 150deg,
      #222 150deg 180deg,
      #1a1a1a 180deg 210deg,
      #222 210deg 240deg,
      #1a1a1a 240deg 270deg,
      #222 270deg 300deg,
      #1a1a1a 300deg 330deg,
      #222 330deg 360deg
    );
    border: 2px solid #111;
  }

  .vinyl-label {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .record-info { flex: 1; min-width: 0; }

  .record-artist {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .record-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }

  .record-meta {
    display: flex;
    gap: 10px;
    margin-top: 5px;
    align-items: center;
  }

  .record-year {
    font-size: 11px;
    color: var(--muted);
  }

  .record-genre {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--groove);
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .stars {
    font-size: 12px;
    letter-spacing: -1px;
  }

  .record-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .btn-icon:active { transform: scale(0.9); }
  .btn-icon.delete:active { background: #e74c3c; border-color: #e74c3c; color: #fff; }
  .btn-icon.edit:active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-icon.fav.on { color: #e74c3c; border-color: #e74c3c; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-disc { font-size: 64px; margin-bottom: 16px; opacity: 0.2; }
  .empty h3 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty p { font-size: 12px; line-height: 1.6; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 50%;
    transform: translateX(50%);
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 28px;
    padding: 14px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow: 0 4px 28px rgba(74, 158, 255, 0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    z-index: 200;
  }

  .fab:active { transform: translateX(50%) scale(0.96); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border-top: 1px solid var(--border);
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-input, .form-select {
    width: 100%;
    background: var(--groove);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus { border-color: var(--accent); }

  .rating-picker {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin: 4px 0;
  }

  .star-btn {
    background: none;
    border: none;
    color: var(--border);
    font-size: 28px;
    cursor: pointer;
    padding: 0;
    transition: all 0.15s;
  }

  .star-btn.active { color: var(--accent); }
  .star-btn:hover { transform: scale(1.1); }

  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.06em;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
    font-weight: 700;
  }

  .btn-submit:active { opacity: 0.85; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(10px);
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 12px;
    font-weight: 400;
  }

  .genre-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .genre-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(10px);
    font-size: 13px;
  }

  .genre-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--groove);
    border-radius: 4px;
    overflow: hidden;
  }

  .genre-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* FOTO POLE */
  .photo-section {
    margin-bottom: 14px;
    padding: 12px;
    background: var(--groove);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .photo-label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .photo-btn-group {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .photo-btn {
    flex: 1;
    padding: 8px 10px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .photo-btn:active { background: var(--accent); color: #000; }

  #photoInput { display: none; }

  .photo-preview {
    width: 100%;
    height: 100px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    object-fit: cover;
    display: none;
  }

  .photo-preview.show { display: block; }

  .photo-clear-btn {
    width: 100%;
    padding: 6px;
    background: transparent;
    border: 1px solid rgba(255,100,100,.5);
    color: #ff6464;
    font-size: 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: 'DM Mono', monospace;
  }

  .photo-clear-btn:active { background: rgba(255,100,100,.2); }

  /* SYNC BUTTONS */
  .sync-bar {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 12px;
  }
  .sync-btn {
    flex: 1;
    padding: 8px 10px;
    background: var(--groove);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sync-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #importFileInput { display: none; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* LIGHTBOX */
  #lp-lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);justify-content:center;align-items:center;}
  #lp-lightbox.open{display:flex;}
  #lp-lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:6px;box-shadow:0 0 40px rgba(255,100,100,.1);}
  #lp-lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:2rem;cursor:pointer;opacity:.7;}
  #lp-lightbox-close:hover{opacity:1;}

  /* DRAG & DROP */
  .record-card[draggable] { cursor: grab; }
  .record-card.dragging { opacity: .35; transform: scale(.97); }
  .record-card.drag-over { border-color: var(--accent) !important; box-shadow: 0 0 12px rgba(99,102,241,.3); }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="app-title">KLADYXLAND</div>
      <div class="app-subtitle">Moje LP desky <span style="font-size:.55rem;color:rgba(255,255,255,.2);font-family:monospace;margin-left:6px;">ver.1.4.LP</span></div>
    </div>
    <div class="count-badge" id="countBadge">0 desek</div>
  </div>
  <div class="sync-bar">
    <button class="sync-btn" onclick="exportJSON()">⬇ Export</button>
    <span id="sync-dot" style="font-size:.75rem;color:#4a6d90;letter-spacing:.05em;margin-left:auto;align-self:center;">⏳ Načítám...</span>
    <button class="sync-btn" onclick="document.getElementById('importFileInput').click()">⬆ Import</button>
    <input type="file" id="importFileInput" accept=".json" onchange="importJSON(event)">
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('kolekce', this)">Kolekce</button>
    <button class="tab" onclick="switchTab('oblibene', this)">♥ Oblíbené</button>
    <button class="tab" onclick="switchTab('statistiky', this)">Statistiky</button>
    <button class="tab" onclick="switchTab('seznam', this)">Seznam</button>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <input class="search-input" id="searchInput" oninput="render()" placeholder="Hledat v kolekci..." type="text">
</div>

<main id="mainContent"></main>

<button class="fab" onclick="openModal()">
  <span style="font-size:18px">+</span> Přidat desku
</button>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">Nová deska</h2>

    <div class="form-group">
      <label class="form-label">Interpret</label>
      <input class="form-input" id="fArtist" placeholder="např. Pink Floyd" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Název alba</label>
      <input class="form-input" id="fTitle" placeholder="např. The Dark Side of the Moon" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Rok vydání</label>
      <input class="form-input" id="fYear" placeholder="např. 1973" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Žánr</label>
      <select class="form-select" id="fGenre">
        <option value="Rock">Rock</option>
        <option value="Jazz">Jazz</option>
        <option value="Pop">Pop</option>
        <option value="Klasika">Klasika</option>
        <option value="Blues">Blues</option>
        <option value="Folk">Folk</option>
        <option value="Soul">Soul</option>
        <option value="Electronic">Electronic</option>
        <option value="Metal">Metal</option>
        <option value="Jiné">Jiné</option>
      </select>
    </div>

    <div class="photo-section">
      <label class="photo-label">📸 Obal desky</label>
      <div class="photo-btn-group">
        <button type="button" class="photo-btn" onclick="capturePhoto()">📷 Vyfotit</button>
        <button type="button" class="photo-btn" onclick="uploadPhoto()">📁 Vybrat</button>
      </div>
      <div id="lpDropZone" ondragover="event.preventDefault();this.style.borderColor='var(--accent2)'" ondragleave="this.style.borderColor='rgba(255,255,255,.1)'" ondrop="lpHandleDrop(event)" style="border:2px dashed rgba(255,255,255,.1);border-radius:8px;padding:12px;text-align:center;cursor:pointer;color:rgba(255,255,255,.35);font-size:.78rem;margin-top:8px;transition:border-color .2s;">
        📁 Přetáhni obal sem (PC)
      </div>
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(event)">
      <img class="photo-preview" id="photoPreview">
      <button type="button" class="photo-clear-btn" id="photoClearBtn" style="display:none;" onclick="clearPhoto()">Smazat fotku</button>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="saveRecord()">Přidat do sbírky</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── FIREBASE SYNC ─────────────────────────────────────────────
  const _fbConfig = {
    apiKey: "AIzaSyDmAf2CZILbYKR72XYd3iCj3pQgnqFYTp8",
    authDomain: "kladyxland.firebaseapp.com",
    databaseURL: "https://kladyxland-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kladyxland",
    storageBucket: "kladyxland.firebasestorage.app",
    messagingSenderId: "178078059030",
    appId: "1:178078059030:web:8d8a0271b23a7aca2b4337"
  };
  if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
  const _db = firebase.database();
  const _storage = firebase.storage();
  const _lpRef = _db.ref('lpRecordsDb');

  function _setSyncStatus(msg, color) {
    const el = document.getElementById('sync-dot');
    if (el) { el.textContent = msg; el.style.color = color || '#4a6d90'; }
  }
  // ──────────────────────────────────────────────────────────────

  const GENRE_COLORS = {
    Rock: '#c45c3a', Jazz: '#5a9ec4', Pop: '#c45a9e',
    Klasika: '#9ec45a', Blues: '#5ac49e', Folk: '#c4a45a',
    Soul: '#e8a04a', Electronic: '#4ab8e8', Metal: '#888', Jiné: '#aaa'
  };

  let records = JSON.parse(localStorage.getItem('lp_records') || '[]');
  let currentRating = 0;
  let currentTab = 'kolekce';
  let editingId = null; // ID desky, která se edituje (null = přidávání nové)
  let currentPhoto = null;
  let currentPhotoFile = null;

  let _lpSaving = false;

  function save() {
    _lpSaving = true;
    setTimeout(() => { _lpSaving = false; }, 3000);
    localStorage.setItem('lp_records', JSON.stringify(records));
    updateBadge();
    // Uložit do Firebase – konvertuj array na objekt keyed by id
    const obj = {};
    records.forEach(r => { obj['id_' + r.id] = r; });
    _setSyncStatus('⏳ Ukládám...', '#f39c12');
    _lpRef.set(obj)
      .then(() => _setSyncStatus('✅ Synchronizováno', '#2ecc71'))
      .catch(e => { console.error('Firebase save error:', e); _setSyncStatus('❌ Chyba sync', '#e74c3c'); });
  }

  function updateBadge() {
    const n = records.length;
    document.getElementById('countBadge').textContent = n + (n === 1 ? ' deska' : n < 5 ? ' desky' : ' desek');
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const sb = document.getElementById('searchBar');
    sb.style.display = (tab === 'statistiky' || tab === 'seznam') ? 'none' : 'block';
    render();
  }

  function render() {
    if (currentTab === 'statistiky') renderStats();
    else if (currentTab === 'seznam') renderSeznam();
    else renderList();
  }

  function renderList() {
    const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
    let list = records.filter(r => {
      const match = r.artist.toLowerCase().includes(query) || r.title.toLowerCase().includes(query);
      if (currentTab === 'oblibene') return match && r.fav;
      return match;
    });

    const main = document.getElementById('mainContent');
    if (list.length === 0) {
      main.innerHTML = `<div class="empty">
        <div class="empty-disc">◉</div>
        <h3>${currentTab === 'oblibene' ? 'Žádné oblíbené' : 'Sbírka je prázdná'}</h3>
        <p>${currentTab === 'oblibene' ? 'Klikni na srdíčko u desky,<br>aby se zobrazila zde.' : 'Přidej svou první LP desku<br>tlačítkem níže.'}</p>
      </div>`;
      return;
    }

    main.innerHTML = list.map((r, i) => {
      const color = GENRE_COLORS[r.genre] || '#888';
      const stars = '★'.repeat(r.rating || 0) + '☆'.repeat(5 - (r.rating || 0));
      return `<div class="record-card" draggable="true" data-id="${r.id}" style="animation-delay:${i * 0.05}s" ondragstart="lpDragStart(event)" ondragover="lpDragOver(event)" ondragleave="lpDragLeave(event)" ondrop="lpDrop(event)">
        ${r.photo ? `<img src="${r.photo}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer;" onclick="lpOpenLightbox('${r.photo}')">` : `<div class="vinyl">
          <div class="vinyl-label" style="background:${color}">${r.genre.substring(0,2).toUpperCase()}</div>
        </div>`}
        <div class="record-info">
          <div class="record-artist">${r.artist}</div>
          <div class="record-title">${r.title}</div>
          <div class="record-meta">
            <span class="record-year">${r.year || '—'}</span>
            <span class="record-genre">${r.genre}</span>
            ${r.rating ? `<span class="stars" style="color:${color}">${stars}</span>` : ''}
          </div>
        </div>
        <div class="record-actions">
          <button class="btn-icon fav ${r.fav ? 'on' : ''}" onclick="toggleFav(${r.id}, event)" title="Oblíbené">♥</button>
          <button class="btn-icon edit" onclick="editRecord(${r.id}, event)" title="Upravit">✎</button>
          <button class="btn-icon delete" onclick="deleteRecord(${r.id}, event)" title="Smazat">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  function renderStats() {
    const main = document.getElementById('mainContent');
    if (records.length === 0) {
      main.innerHTML = `<div class="empty"><div class="empty-disc">◉</div><h3>Zatím žádná data</h3><p>Přidej desky pro zobrazení statistik.</p></div>`;
      return;
    }

    const genres = {};
    let totalRating = 0, rated = 0;
    records.forEach(r => {
      genres[r.genre] = (genres[r.genre] || 0) + 1;
      if (r.rating) { totalRating += r.rating; rated++; }
    });

    const topGenre = Object.entries(genres).sort((a,b) => b[1]-a[1])[0];
    const avgRating = rated ? (totalRating / rated).toFixed(1) : '—';
    const favCount = records.filter(r => r.fav).length;
    const maxGenre = topGenre[1];

    main.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card" style="animation-delay:0s"><div class="stat-value">${records.length}</div><div class="stat-label">Celkem desek</div></div>
        <div class="stat-card" style="animation-delay:0.05s"><div class="stat-value">${favCount}</div><div class="stat-label">Oblíbených</div></div>
        <div class="stat-card" style="animation-delay:0.1s"><div class="stat-value">${avgRating}</div><div class="stat-label">Průměrné hodnocení</div></div>
        <div class="stat-card" style="animation-delay:0.15s"><div class="stat-value">${Object.keys(genres).length}</div><div class="stat-label">Různých žánrů</div></div>
      </div>
      <div class="section-label">Žánry v kolekci</div>
      <div class="genre-list">
        ${Object.entries(genres).sort((a,b)=>b[1]-a[1]).map(([g, n], i) => `
          <div class="genre-row" style="animation-delay:${0.2 + i*0.05}s">
            <span style="color:${GENRE_COLORS[g]||'#aaa'};min-width:70px">${g}</span>
            <div class="genre-bar-wrap"><div class="genre-bar" style="width:${(n/maxGenre)*100}%;background:${GENRE_COLORS[g]||'#aaa'}"></div></div>
            <span style="color:var(--muted);font-size:12px">${n}</span>
          </div>`).join('')}
      </div>`;
  }

  function openModal() {
    editingId = null; // Přidávání nové desky
    document.getElementById('modalTitle').textContent = 'Nová deska';
    document.getElementById('submitBtn').textContent = 'Přidat do sbírky';
    document.getElementById('modalOverlay').classList.add('open');
    currentRating = 0;
    currentPhoto = null;
    document.getElementById('fArtist').value = '';
    document.getElementById('fTitle').value = '';
    document.getElementById('fYear').value = '';
    document.getElementById('fGenre').value = 'Rock';
    clearPhotoDisplay();
    setTimeout(() => document.getElementById('fArtist').focus(), 300);
  }

  function editRecord(id, e) {
    e.stopPropagation();
    const record = records.find(r => r.id === id);
    if (!record) return;

    editingId = id; // Nastavíme režim editace
    document.getElementById('modalTitle').textContent = 'Upravit desku';
    document.getElementById('submitBtn').textContent = 'Uložit změny';
    
    // Vyplníme formulář daty z desky
    document.getElementById('fArtist').value = record.artist;
    document.getElementById('fTitle').value = record.title;
    document.getElementById('fYear').value = record.year || '';
    document.getElementById('fGenre').value = record.genre;
    currentRating = record.rating || 0;
    
    // Fotka
    currentPhoto = (record.photo && record.photo.startsWith('http')) ? record.photo : null;
    if (currentPhoto) {
      document.getElementById('photoPreview').src = currentPhoto;
      document.getElementById('photoPreview').classList.add('show');
      document.getElementById('photoClearBtn').style.display = 'block';
    } else {
      clearPhotoDisplay();
    }
    
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fArtist').focus(), 300);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function setRating(val) {
    currentRating = val;
    updateStars();
  }

  function updateStars() {
    document.querySelectorAll('.star-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.val) <= currentRating);
    });
  }

  async function saveRecord() {
    const artist = document.getElementById('fArtist').value.trim();
    const title = document.getElementById('fTitle').value.trim();
    
    if (!artist || !title) {
      document.getElementById('fArtist').style.borderColor = artist ? '' : 'var(--accent2)';
      document.getElementById('fTitle').style.borderColor = title ? '' : 'var(--accent2)';
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Ukládám...';

    let photoURL = (currentPhoto && currentPhoto.startsWith('http')) ? currentPhoto : null;
    if (currentPhotoFile) {
      try {
        const compressed = await compressImage(currentPhotoFile);
        const ref = _storage.ref('lp/' + Date.now() + '_' + compressed.name);
        await ref.put(compressed);
        photoURL = await ref.getDownloadURL();
        currentPhoto = photoURL;
        currentPhotoFile = null;
      } catch(e) { console.error('Upload fotky selhal:', e); }
    }

    const recordData = {
      artist,
      title,
      year: document.getElementById('fYear').value || '',
      genre: document.getElementById('fGenre').value,
      rating: currentRating,
      photo: photoURL
    };

    if (editingId !== null) {
      // Editace existující desky
      const record = records.find(r => r.id === editingId);
      if (record) {
        Object.assign(record, recordData);
      }
    } else {
      // Přidání nové desky
      records.push({
        id: Date.now(),
        ...recordData,
        fav: false
      });
    }

    btn.disabled = false;
    btn.textContent = editingId !== null ? 'Uložit změny' : 'Přidat do sbírky';
    save();
    closeModal();
    if (currentTab !== 'kolekce') switchTab('kolekce', document.querySelector('.tab'));
    else render();
  }

  function renderSeznam() {
    const main = document.getElementById('mainContent');
    if (records.length === 0) {
      main.innerHTML = `<div class="empty"><div class="empty-disc">◉</div><h3>Sbírka je prázdná</h3><p>Přidej desky tlačítkem níže.</p></div>`;
      return;
    }
    const sorted = [...records].sort((a, b) => a.artist.localeCompare(b.artist));
    main.innerHTML = `
      <div style="padding:16px 16px 0;">
        <button onclick="exportCSV()" style="width:100%;padding:13px;background:var(--accent);border:none;color:#fff;font-weight:700;font-size:.95rem;border-radius:10px;cursor:pointer;letter-spacing:.04em;">⬇ Exportovat jako CSV</button>
      </div>
      <div style="padding:12px 16px 80px;">
        <table style="width:100%;border-collapse:collapse;font-size:.85rem;">
          <thead>
            <tr style="border-bottom:2px solid var(--accent);color:var(--muted);text-align:left;">
              <th style="padding:8px 6px;">#</th>
              <th style="padding:8px 6px;">Interpret</th>
              <th style="padding:8px 6px;">Album</th>
              <th style="padding:8px 6px;">Rok</th>
              <th style="padding:8px 6px;">Žánr</th>
              <th style="padding:8px 6px;">★</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.map((r, i) => `
              <tr style="border-bottom:1px solid rgba(255,255,255,.07);">
                <td style="padding:8px 6px;color:var(--muted);">${i + 1}</td>
                <td style="padding:8px 6px;font-weight:600;">${r.artist}</td>
                <td style="padding:8px 6px;">${r.title}</td>
                <td style="padding:8px 6px;color:var(--muted);">${r.year || '—'}</td>
                <td style="padding:8px 6px;color:var(--muted);">${r.genre || '—'}</td>
                <td style="padding:8px 6px;">${'★'.repeat(r.rating || 0)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function exportCSV() {
    const sorted = [...records].sort((a, b) => a.artist.localeCompare(b.artist));
    const header = ['#', 'Interpret', 'Album', 'Rok', 'Zanr', 'Hodnoceni', 'Oblibene'];
    const rows = sorted.map((r, i) => [
      i + 1,
      '"' + (r.artist || '').replace(/"/g, '""') + '"',
      '"' + (r.title || '').replace(/"/g, '""') + '"',
      r.year || '',
      '"' + (r.genre || '').replace(/"/g, '""') + '"',
      r.rating || 0,
      r.fav ? 'Ano' : 'Ne'
    ]);
    const csv = [header, ...rows].map(r => r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'kladyxland_lp_desky.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function deleteRecord(id, e) {
    e.stopPropagation();
    records = records.filter(r => r.id !== id);
    save();
    render();
  }

  function toggleFav(id, e) {
    e.stopPropagation();
    const r = records.find(r => r.id === id);
    if (r) { r.fav = !r.fav; save(); render(); }
  }

  // FOTOAPARÁT FUNKCE

  function lpOpenLightbox(url) {
    document.getElementById('lp-lightbox-img').src = url;
    document.getElementById('lp-lightbox').classList.add('open');
  }

  function compressImage(file, maxWidth=1200, quality=0.75) {
    return new Promise((resolve) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => resolve(new File([blob], file.name, {type:'image/jpeg'})), 'image/jpeg', quality);
      };
      img.src = url;
    });
  }

  let lpDragSrcId = null;

  function lpDragStart(e) {
    lpDragSrcId = parseInt(e.currentTarget.dataset.id);
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function lpDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  }

  function lpDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }

  function lpDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    const targetId = parseInt(e.currentTarget.dataset.id);
    if (lpDragSrcId === targetId) return;
    const srcIdx = records.findIndex(r => r.id === lpDragSrcId);
    const tgtIdx = records.findIndex(r => r.id === targetId);
    if (srcIdx === -1 || tgtIdx === -1) return;
    const [moved] = records.splice(srcIdx, 1);
    records.splice(tgtIdx, 0, moved);
    save();
    render();
  }

  function lpHandleDrop(e) {
    e.preventDefault();
    document.getElementById('lpDropZone').style.borderColor = 'rgba(255,255,255,.1)';
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    currentPhotoFile = file;
    currentPhoto = null;
    const url = URL.createObjectURL(file);
    document.getElementById('photoPreview').src = url;
    document.getElementById('photoPreview').classList.add('show');
    document.getElementById('photoClearBtn').style.display = 'block';
  }

  function capturePhoto() {
    const input = document.getElementById('photoInput');
    input.setAttribute('capture', 'environment');
    input.click();
  }

  function uploadPhoto() {
    const input = document.getElementById('photoInput');
    input.removeAttribute('capture');
    input.click();
  }

  function handlePhotoSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    currentPhotoFile = file;
    const url = URL.createObjectURL(file);
    currentPhoto = null; // bude nahrazeno URL po uploadu
    document.getElementById('photoPreview').src = url;
    document.getElementById('photoPreview').classList.add('show');
    document.getElementById('photoClearBtn').style.display = 'block';
    document.getElementById('photoInput').value = '';
  }

  function clearPhoto() {
    currentPhoto = null;
    currentPhotoFile = null;
    clearPhotoDisplay();
  }

  function clearPhotoDisplay() {
    document.getElementById('photoPreview').classList.remove('show');
    document.getElementById('photoPreview').src = '';
    document.getElementById('photoClearBtn').style.display = 'none';
  }

  // === EXPORT / IMPORT ===
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function exportJSON() {
    if (records.length === 0) { showToast('Žádná data k exportu'); return; }
    const data = JSON.stringify(records, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'lp_desky_backup.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Export hotový ✓');
  }

  function importJSON(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error('Neplatný formát');
        const valid = imported.every(r => r.artist && r.title);
        if (!valid) throw new Error('Chybí povinná pole');

        if (confirm(`Importovat ${imported.length} desek?\nStávající data budou nahrazena.`)) {
          records = imported;
          save();
          render();
          showToast(`Importováno ${imported.length} desek ✓`);
        }
      } catch (err) {
        showToast('Chyba: neplatný soubor');
      }
      event.target.value = '';
    };
    reader.readAsText(file);
  }

  // ── FIREBASE REAL-TIME LISTENER ───────────────────────────────
  const _DEMO_LP = [
    { id: 1, artist: 'Pink Floyd', title: 'The Dark Side of the Moon', year: '1973', genre: 'Rock', rating: 5, fav: true },
    { id: 2, artist: 'Miles Davis', title: 'Kind of Blue', year: '1959', genre: 'Jazz', rating: 5, fav: true },
    { id: 3, artist: 'Led Zeppelin', title: 'IV', year: '1971', genre: 'Rock', rating: 4, fav: false },
    { id: 4, artist: 'Joni Mitchell', title: 'Blue', year: '1971', genre: 'Folk', rating: 5, fav: false },
  ];

  let _firstLpLoad = true;
  _lpRef.on('value', (snapshot) => {
    const fbData = snapshot.val();
    if (_firstLpLoad) {
      _firstLpLoad = false;
      if (!fbData) {
        // Firebase prázdný – nahraj lokální data nebo demo
        if (records.length === 0) { records = _DEMO_LP; }
        save();
      } else {
        records = Object.values(fbData);
        localStorage.setItem('lp_records', JSON.stringify(records));
      }
      updateBadge();
      render();
      _setSyncStatus('✅ Synchronizováno', '#2ecc71');
      return;
    }
    // Aktualizace z jiného zařízení
    if (_lpSaving) return; // ignoruj vlastní zápis
    if (fbData) {
      const fbRecords = Object.values(fbData);
      if (JSON.stringify(fbRecords) !== JSON.stringify(records)) {
        records = fbRecords;
        localStorage.setItem('lp_records', JSON.stringify(records));
        updateBadge();
        render();
        _setSyncStatus('🔄 Synchronizováno', '#2ecc71');
      }
    }
  }, (error) => {
    console.error('Firebase listener error:', error);
    _setSyncStatus('❌ Offline', '#e74c3c');
    // Fallback na localStorage
    updateBadge();
    render();
  });
  // ──────────────────────────────────────────────────────────────
</script>

<div id="lp-lightbox" onclick="document.getElementById('lp-lightbox').classList.remove('open')">
  <span id="lp-lightbox-close">✕</span>
  <img id="lp-lightbox-img" src="" alt="">
</div>
<div style="text-align:center;padding:8px;font-size:.6rem;color:rgba(255,255,255,.2);font-family:monospace;">ver.1.4.LP</div>
